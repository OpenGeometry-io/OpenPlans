name: Release Notes

on:
  pull_request:
    types:
      - closed

jobs:
  release_notes:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR Content
        uses: actions/checkout@v4

      - name: Capture PR Title, Date and User
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          # Sanitize PR_TITLE: only printable ASCII, drop quotes, backticks, $ and \
          SAFE_TITLE=$(printf '%s' "$PR_TITLE" | tr -d '\r\n' | LC_ALL=C tr -cd '[:print:]' | sed 's/[`"\\$]//g')

          # Sanitize PR_USER: GitHub logins are alphanumerics and hyphens only
          SAFE_USER=$(printf '%s' "$PR_USER" | LC_ALL=C tr -cd 'A-Za-z0-9-')

          # Validate merged_at is an ISO timestamp before parsing
          if ! printf '%s' "$PR_MERGED_AT" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$'; then
            echo "Invalid merged_at value, aborting."
            exit 0
          fi
          PR_DATE=$(date -d "$PR_MERGED_AT" '+%Y-%m-%d')

          if [[ -z "$SAFE_TITLE" ]]; then
            echo "No PR title found."
            exit 0
          fi

          if [[ "$SAFE_TITLE" == *"feat:"* ]]; then
            TYPE="feature"
            MESSAGE=$(printf '%s' "$SAFE_TITLE" | grep -oP "(?<=feat: ).*" || true)
            if [[ -n "$MESSAGE" ]]; then
              echo "message=$MESSAGE" >> "$GITHUB_ENV"
              echo "type=$TYPE" >> "$GITHUB_ENV"
              echo "pr_user=$SAFE_USER" >> "$GITHUB_ENV"
              echo "pr_date=$PR_DATE" >> "$GITHUB_ENV"
            else
              echo "No valid feature message found after feat: "
              exit 0
            fi
          else
            echo "No feat: found in PR title."
            exit 0
          fi

      - name: Push To Notion
        if: env.message != ''
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          MESSAGE: ${{ env.message }}
          TYPE: ${{ env.type }}
          PR_USER: ${{ env.pr_user }}
          PR_DATE: ${{ env.pr_date }}
        run: |
          # Build JSON payload safely with jq to avoid injection through any field
          PAYLOAD=$(jq -nc \
            --arg message "$MESSAGE" \
            --arg type "$TYPE" \
            --arg pr_user "$PR_USER" \
            --arg pr_date "$PR_DATE" \
            '{
              parent: { database_id: "15053776c9c18005be88d76140c9a7b5" },
              properties: {
                Title:        { rich_text: [ { text: { content: $message } } ] },
                "Release Date": { date: { start: $pr_date } },
                Type:         { rich_text: [ { text: { content: $type } } ] },
                "Released By": { rich_text: [ { text: { content: $pr_user } } ] },
                Name:         { title:     [ { text: { content: $message } } ] }
              }
            }')

          curl -sS -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data "$PAYLOAD"
