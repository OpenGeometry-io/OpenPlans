<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlan Line Dimensions</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
      cursor: unset !important;
    }

    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Line Dimension</div>
  <div id="app">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from './../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Plan;

      const lengthDim = openPlans.createDimension("length");
      console.log(lengthDim);
      lengthDim.startPoint = [1.5, 0, 1.5]
      lengthDim.endPoint = [3.5, 0, 1.5]
    }

    function setUI() {
      const gui = new GUI();
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
