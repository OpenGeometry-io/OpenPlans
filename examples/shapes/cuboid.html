<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Cuboid</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: "JetBrains Mono", monospace;
    }

    #app {
      width: 100%;
      height: 100vh;
    }

    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Cuboid Shape</div>
  <div id="app" style="width: 100%; height: 100vh;">
  </div>
  <script type="module">
    import { OpenPlans, Vector3, CameraMode } from './../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let cuboid;
    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      openPlans.showGrid = false;

      // Create a default cuboid on scene load
      cuboid = openPlans.cuboid();
      cuboid.outline = true;

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      const cuboidFolder = gui.addFolder('Cuboid');
      cuboidFolder.open();

      const params = {
        outline: true,
      };

      cuboidFolder.add(params, 'outline').name('Outline').onChange((value) => {
        if (cuboid) cuboid.outline = value;
      });

      cuboidFolder.add({
        preloadCuboid: () => {
          const config = {
            ogid: '86302abc-d71e-47be-affc-dc05de1db8fe',
            width: 20,
            height: 10,
            depth: 1,
            color: 0x000000,
            center: new Vector3(20, 0, 0)
          };
          const preloadConfig = openPlans.cuboid(config);
          preloadConfig.outline = params.outline;

          console.log('Preloaded Cuboid Config:', preloadConfig.getOPConfig());
        }
      }, 'preloadCuboid');

      cuboidFolder.add({
        logConfig: () => {
          if (cuboid) {
            console.log('Current Cuboid Config:', cuboid.getOPConfig());
          } else {
            console.log('No cuboid created yet.');
          }
        }
      }, 'logConfig');

      cuboidFolder.add({ fit: () => { if (cuboid) openPlans.fit(cuboid.id) } }, 'fit').name('Fit');
      cuboidFolder.add({ getConfig: () => console.log(cuboid.getOPConfig()) }, 'getConfig').name('Get Config');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
