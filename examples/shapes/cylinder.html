<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Cylinder</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: "JetBrains Mono", monospace;
    }

    #app {
      width: 100%;
      height: 100vh;
    }

    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Cylinder Shape</div>
  <div id="app" style="width: 100%; height: 100vh;">
  </div>
  <script type="module">
    import { OpenPlans, Vector3, CameraMode } from './../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let cylinder;
    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      openPlans.showGrid = false;

      // Create a default cylinder on scene load
      cylinder = openPlans.cylinder();
      cylinder.outline = true;

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      const cylinderFolder = gui.addFolder('Cylinder');
      cylinderFolder.open();

      const params = {
        outline: true,
      };

      cylinderFolder.add(params, 'outline').name('Outline').onChange((value) => {
        if (cylinder) cylinder.outline = value;
      });

      // cylinderFolder.add({
      //   createCylinder: () => {
      //     cylinder = openPlans.cylinder();
      //     cylinder.outline = params.outline;
      //   }
      // }, 'createCylinder');

      cylinderFolder.add({
        preloadCylinder: () => {
          const config = {
            ogid: '86302abc-d71e-47be-affc-dc05de1db8fe',
            radius: 10,
            height: 20,
            depth: 1,
            color: 0x000000,
            center: new Vector3(20, 0, 0),
            angle: 1 * Math.PI,
            color: 0xf0f0f0,
          };
          const preloadConfig = openPlans.cylinder(config);
          preloadConfig.outline = params.outline;

          console.log('Preloaded Cylinder Config:', preloadConfig.getOPConfig());
        }
      }, 'preloadCylinder');

      cylinderFolder.add({
        logConfig: () => {
          if (cylinder) {
            console.log('Current Cylinder Config:', cylinder.getOPConfig());
          } else {
            console.log('No cylinder created yet.');
          }
        }
      }, 'logConfig');

      cylinderFolder.add({ fit: () => { if (cylinder) openPlans.fit(cylinder.id) } }, 'fit').name('Fit');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
