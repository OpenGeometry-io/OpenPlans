<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Stove 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let stove;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            stove = openPlans.stove2D({
                labelName: 'Stove'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Stove 2D');
            folder.add({ labelName: stove.labelName }, 'labelName').name('Label').onChange(v => stove.labelName = v);
            folder.add({ width: stove.dimensions.width }, 'width', 0.45, 1.5, 0.01).name('Width').onChange(v => {
                stove.dimensions = { ...stove.dimensions, width: v };
            });
            folder.add({ depth: stove.dimensions.depth }, 'depth', 0.45, 1.5, 0.01).name('Depth').onChange(v => {
                stove.dimensions = { ...stove.dimensions, depth: v };
            });
            folder.addColor({ bodyColor: stove.bodyColor }, 'bodyColor').name('Body Color').onChange(v => stove.bodyColor = v);
            folder.add({ fit: () => openPlans.fit(stove.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
