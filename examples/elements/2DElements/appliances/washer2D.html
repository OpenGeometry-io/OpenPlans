<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Washer 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let washer;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            washer = openPlans.washer2D({
                labelName: 'Washing Machine'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Washer 2D');
            folder.add({ labelName: washer.labelName }, 'labelName').name('Label').onChange(v => washer.labelName = v);
            folder.add({ width: washer.dimensions.width }, 'width', 0.45, 1, 0.01).name('Width').onChange(v => {
                washer.dimensions = { ...washer.dimensions, width: v };
            });
            folder.add({ depth: washer.dimensions.depth }, 'depth', 0.45, 1, 0.01).name('Depth').onChange(v => {
                washer.dimensions = { ...washer.dimensions, depth: v };
            });
            folder.addColor({ bodyColor: washer.bodyColor }, 'bodyColor').name('Body Color').onChange(v => washer.bodyColor = v);
            folder.add({ fit: () => openPlans.fit(washer.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
