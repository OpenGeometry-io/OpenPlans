<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Urinal 2D</title>
    <!-- MIXPANEL_TRACKING -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }

        .example-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(26, 26, 26, 0.8);
            padding: 12px 24px;
            z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="example-title">Urinal 2D</div>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans, CameraMode } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let urinal;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            openPlans.CameraMode = CameraMode.Plan;

            urinal = openPlans.urinal2D({
                labelName: 'Urinal'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Urinal 2D');
            folder.add({ labelName: urinal.labelName }, 'labelName').name('Label').onChange(v => urinal.labelName = v);
            folder.add({ width: urinal.dimensions.width }, 'width', 1, 2, 0.01).name('Width').onChange(v => {
                urinal.dimensions = { ...urinal.dimensions, width: v };
            });
            folder.add({ depth: urinal.dimensions.depth }, 'depth', 1, 2, 0.01).name('Depth').onChange(v => {
                urinal.dimensions = { ...urinal.dimensions, depth: v };
            });
            folder.addColor({ urinalColor: urinal.urinalColor }, 'urinalColor').name('Body Color').onChange(v => urinal.urinalColor = v);
            folder.add({ fit: () => openPlans.fit(urinal.id) }, 'fit').name('Fit');
            folder.add({ getConfig: () => console.log(urinal.getOPConfig()) }, 'getConfig').name('Get Config');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
