<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Urinal 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let urinal;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            urinal = openPlans.urinal2D({
                labelName: 'Urinal'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Urinal 2D');
            folder.add({ labelName: urinal.labelName }, 'labelName').name('Label').onChange(v => urinal.labelName = v);
            folder.add({ width: urinal.dimensions.width }, 'width', 1, 2, 0.01).name('Width').onChange(v => {
                urinal.dimensions = { ...urinal.dimensions, width: v };
            });
            folder.add({ depth: urinal.dimensions.depth }, 'depth', 1, 2, 0.01).name('Depth').onChange(v => {
                urinal.dimensions = { ...urinal.dimensions, depth: v };
            });
            folder.addColor({ urinalColor: urinal.urinalColor }, 'urinalColor').name('Body Color').onChange(v => urinal.urinalColor = v);
            folder.add({ fit: () => openPlans.fit(urinal.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
