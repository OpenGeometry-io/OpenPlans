<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Sink 2D</title>
    <!-- MIXPANEL_TRACKING -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }

        .example-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(26, 26, 26, 0.8);
            padding: 12px 24px;
            z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="example-title">Sink 2D</div>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans, CameraMode } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let sink;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            openPlans.CameraMode = CameraMode.Plan;

            sink = openPlans.sink2D({
                labelName: 'Bathroom Sink'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Sink 2D');
            folder.add({ labelName: sink.labelName }, 'labelName').name('Label').onChange(v => sink.labelName = v);
            folder.add({ width: sink.dimensions.width }, 'width', 1.2, 3.0, 0.01).name('Width').onChange(v => {
                sink.dimensions = { ...sink.dimensions, width: v };
            });
            folder.add({ depth: sink.dimensions.depth }, 'depth', 0.8, 2.0, 0.01).name('Depth').onChange(v => {
                sink.dimensions = { ...sink.dimensions, depth: v };
            });
            folder.addColor({ basinColor: sink.basinColor }, 'basinColor').name('Basin Color').onChange(v => sink.basinColor = v);
            folder.addColor({ counterColor: sink.counterColor }, 'counterColor').name('Counter Color').onChange(v => sink.counterColor = v);
            folder.add({ fit: () => openPlans.fit(sink.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
