<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Shower 2D</title>
    <!-- MIXPANEL_TRACKING -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }

        .example-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(26, 26, 26, 0.8);
            padding: 12px 24px;
            z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="example-title">Shower 2D</div>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans, CameraMode } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let shower;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            openPlans.CameraMode = CameraMode.Plan;

            shower = openPlans.shower2D({
                labelName: 'Shower',
                dimensions: { width: 0.9, depth: 0.9 }
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Shower 2D');
            folder.add({ labelName: shower.labelName }, 'labelName').name('Label').onChange(v => shower.labelName = v);
            folder.add({ width: shower.dimensions.width }, 'width', 0.7, 2, 0.01).name('Width').onChange(v => {
                shower.dimensions = { ...shower.dimensions, width: v };
            });
            folder.add({ depth: shower.dimensions.depth }, 'depth', 0.7, 2, 0.01).name('Depth').onChange(v => {
                shower.dimensions = { ...shower.dimensions, depth: v };
            });
            folder.addColor({ floorColor: shower.floorColor }, 'floorColor').name('Floor Color').onChange(v => shower.floorColor = v);
            folder.add({ fit: () => openPlans.fit(shower.id) }, 'fit').name('Fit');
            folder.add({ getConfig: () => console.log(shower.getOPConfig()) }, 'getConfig').name('Get Config');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
