<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Stair 2D</title>
    <!-- MIXPANEL_TRACKING -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="OpenGeometry Demo">
    <meta name="author" content="Vishwajeet Mane">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }

        .example-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(26, 26, 26, 0.8);
            padding: 12px 24px;
            z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="example-title">Stair 2D</div>
    <div id="app" style="width: 100%; height: 100vh;">
    </div>
    <div id="profileViewContainer"
        style="width: 300px; height: 300px; position: absolute; bottom: 10px; right: 10px; border: 1px solid #000;">
        <!-- 2D Profile View will be rendered here -->
    </div>

    <script type="module">
        import { OpenPlans, CameraMode } from './../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let stair;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            openPlans.CameraMode = CameraMode.Plan;

            stair = openPlans.stair2D();

            const profileContainer = document.getElementById('profileViewContainer');
            const { camera, renderer } = openPlans.create2DView(profileContainer, 2);
            profileContainer.appendChild(renderer.domElement);
        }

        function setUI() {
            const gui = new GUI();
            const stairFolder = gui.addFolder('Stair 2D');
            const stairControls = {
                'labelName': stair.labelName,
                'stairWidth': stair.stairDimensions.width,
                'stairLength': stair.stairDimensions.length,
                'numberOfSteps': stair.numberOfSteps,
                'direction': stair.direction,
                'stairColor': stair.stairColor,
                'arrowColor': stair.arrowColor
            };

            stairFolder.add(stairControls, 'labelName').name('Label Name').onChange((value) => {
                stair.labelName = value;
            });
            stairFolder.add(stairControls, 'stairWidth', 0.6, 2.5).name('Stair Width').onChange((value) => {
                stair.stairDimensions = { ...stair.stairDimensions, width: value };
            });
            stairFolder.add(stairControls, 'stairLength', 1.5, 6).name('Stair Length').onChange((value) => {
                stair.stairDimensions = { ...stair.stairDimensions, length: value };
            });
            stairFolder.add(stairControls, 'numberOfSteps', 3, 20, 1).name('Number of Steps').onChange((value) => {
                stair.numberOfSteps = value;
            });
            stairFolder.add(stairControls, 'direction', ['UP', 'DOWN']).name('Direction').onChange((value) => {
                stair.direction = value;
            });
            stairFolder.addColor(stairControls, 'stairColor').name('Stair Color').onChange((value) => {
                stair.stairColor = value;
            });
            stairFolder.addColor(stairControls, 'arrowColor').name('Arrow Color').onChange((value) => {
                stair.arrowColor = value;
            });
            stairFolder.add({ fit: () => openPlans.fit(stair.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
