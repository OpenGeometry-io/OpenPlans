<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Sofa 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let sofa;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            sofa = openPlans.sofa2D({
                labelName: '3-Seater Sofa'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Sofa 2D');
            folder.add({ labelName: sofa.labelName }, 'labelName').name('Label').onChange(v => sofa.labelName = v);
            folder.add({ width: sofa.dimensions.width }, 'width', 1.5, 3.0, 0.01).name('Width').onChange(v => {
                sofa.dimensions = { ...sofa.dimensions, width: v };
            });
            folder.add({ depth: sofa.dimensions.depth }, 'depth', 0.7, 1.2, 0.01).name('Depth').onChange(v => {
                sofa.dimensions = { ...sofa.dimensions, depth: v };
            });
            folder.addColor({ sofaColor: sofa.sofaColor }, 'sofaColor').name('Frame Color').onChange(v => sofa.sofaColor = v);
            folder.addColor({ cushionColor: sofa.cushionColor }, 'cushionColor').name('Cushion Color').onChange(v => sofa.cushionColor = v);
            folder.add({ fit: () => openPlans.fit(sofa.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
