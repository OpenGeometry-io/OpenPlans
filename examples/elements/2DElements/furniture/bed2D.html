<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Bed 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let bed;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            bed = openPlans.bed2D({
                labelName: 'King Bed',
                dimensions: { width: 1.6, depth: 2.0 }
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Bed 2D');
            folder.add({ labelName: bed.labelName }, 'labelName').name('Label').onChange(v => bed.labelName = v);
            folder.add({ width: bed.dimensions.width }, 'width', 0.9, 2.0, 0.01).name('Width').onChange(v => {
                bed.dimensions = { ...bed.dimensions, width: v };
            });
            folder.add({ depth: bed.dimensions.depth }, 'depth', 1.5, 2.5, 0.01).name('Depth').onChange(v => {
                bed.dimensions = { ...bed.dimensions, depth: v };
            });
            folder.addColor({ bedColor: bed.bedColor }, 'bedColor').name('Bed Color').onChange(v => bed.bedColor = v);
            folder.addColor({ pillowColor: bed.pillowColor }, 'pillowColor').name('Pillow Color').onChange(v => bed.pillowColor = v);
            folder.add({ fit: () => openPlans.fit(bed.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
