<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Chair 2D</title>
    <!-- MIXPANEL_TRACKING -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }

        .example-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(26, 26, 26, 0.8);
            padding: 12px 24px;
            z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="example-title">Chair 2D</div>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans, CameraMode } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let chair;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            openPlans.CameraMode = CameraMode.Plan;

            chair = openPlans.chair2D({
                labelName: 'Office Chair'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Chair 2D');
            folder.add({ labelName: chair.labelName }, 'labelName').name('Label').onChange(v => chair.labelName = v);
            folder.add({ width: chair.dimensions.width }, 'width', 0.4, 1.0, 0.01).name('Width').onChange(v => {
                chair.dimensions = { ...chair.dimensions, width: v };
            });
            folder.add({ depth: chair.dimensions.depth }, 'depth', 0.4, 1.0, 0.01).name('Depth').onChange(v => {
                chair.dimensions = { ...chair.dimensions, depth: v };
            });
            folder.add({ legSize: chair.legSize }, 'legSize', 0.02, 0.1, 0.01).name('Leg Size').onChange(v => chair.legSize = v);
            folder.addColor({ chairColor: chair.chairColor }, 'chairColor').name('Chair Color').onChange(v => chair.chairColor = v);
            folder.add({ fit: () => openPlans.fit(chair.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
