<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Chair 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let chair;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            chair = openPlans.chair2D({
                labelName: 'Office Chair'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Chair 2D');
            folder.add({ labelName: chair.labelName }, 'labelName').name('Label').onChange(v => chair.labelName = v);
            folder.add({ width: chair.dimensions.width }, 'width', 0.4, 1.0, 0.01).name('Width').onChange(v => {
                chair.dimensions = { ...chair.dimensions, width: v };
            });
            folder.add({ depth: chair.dimensions.depth }, 'depth', 0.4, 1.0, 0.01).name('Depth').onChange(v => {
                chair.dimensions = { ...chair.dimensions, depth: v };
            });
            folder.add({ legSize: chair.legSize }, 'legSize', 0.02, 0.1, 0.01).name('Leg Size').onChange(v => chair.legSize = v);
            folder.addColor({ chairColor: chair.chairColor }, 'chairColor').name('Chair Color').onChange(v => chair.chairColor = v);
            folder.add({ fit: () => openPlans.fit(chair.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
