<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Wardrobe 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let wardrobe;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            wardrobe = openPlans.wardrobe2D({
                labelName: 'Wardrobe'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Wardrobe 2D');
            folder.add({ labelName: wardrobe.labelName }, 'labelName').name('Label').onChange(v => wardrobe.labelName = v);
            folder.add({ width: wardrobe.dimensions.width }, 'width', 1.0, 3.0, 0.01).name('Width').onChange(v => {
                wardrobe.dimensions = { ...wardrobe.dimensions, width: v };
            });
            folder.add({ depth: wardrobe.dimensions.depth }, 'depth', 0.4, 1.0, 0.01).name('Depth').onChange(v => {
                wardrobe.dimensions = { ...wardrobe.dimensions, depth: v };
            });
            folder.add({ doorSlots: wardrobe.doorSlots }, 'doorSlots', 1, 6, 1).name('Door Slots').onChange(v => wardrobe.doorSlots = v);
            folder.addColor({ wardrobeColor: wardrobe.wardrobeColor }, 'wardrobeColor').name('Color').onChange(v => wardrobe.wardrobeColor = v);
            folder.add({ fit: () => openPlans.fit(wardrobe.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
