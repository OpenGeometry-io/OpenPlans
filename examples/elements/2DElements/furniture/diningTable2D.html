<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Dining Table 2D</title>
    <!-- MIXPANEL_TRACKING -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }

        .example-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(26, 26, 26, 0.8);
            padding: 12px 24px;
            z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="example-title">Dining Table 2D</div>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans, CameraMode } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let table;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            openPlans.CameraMode = CameraMode.Plan;

            table = openPlans.diningTable2D({
                labelName: '4-Person Dining Table'
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Dining Table 2D');
            folder.add({ labelName: table.labelName }, 'labelName').name('Label').onChange(v => table.labelName = v);
            folder.add({ width: table.dimensions.width }, 'width', 1.0, 3.0, 0.01).name('Width').onChange(v => {
                table.dimensions = { ...table.dimensions, width: v };
            });
            folder.add({ depth: table.dimensions.depth }, 'depth', 0.8, 2.0, 0.01).name('Depth').onChange(v => {
                table.dimensions = { ...table.dimensions, depth: v };
            });
            folder.add({ seats: table.seats }, 'seats', 2, 12, 2).name('Seats').onChange(v => table.seats = v);
            folder.add({ chairGap: table.chairGap }, 'chairGap', 0.02, 0.2, 0.01).name('Chair Gap').onChange(v => table.chairGap = v);
            folder.addColor({ tableColor: table.tableColor }, 'tableColor').name('Table Color').onChange(v => table.tableColor = v);
            folder.addColor({ chairColor: table.chairColor }, 'chairColor').name('Chair Color').onChange(v => table.chairColor = v);
            folder.add({ fit: () => openPlans.fit(table.id) }, 'fit').name('Fit');
            folder.add({ getConfig: () => console.log(table.getOPConfig()) }, 'getConfig').name('Get Config');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
