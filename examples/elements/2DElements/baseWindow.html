<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Window</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
    }

    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Window</div>
  <div id="app" style="width: 100%; height: 100vh;">
  </div>
  <div id="profileViewContainer"
    style="width: 300px; height: 300px; position: absolute; bottom: 10px; right: 10px; border: 1px solid #000;">
  </div>

  <script type="module">
    import { jsPDF } from 'jspdf';
    import { OpenPlans, CameraMode, PlanPDFGenerator } from './../../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let windowElement;
    const pdfGenerator = new PlanPDFGenerator();

    const EXPORT_VIEW_OPTIONS = {
      Top: 'top',
      Front: 'front',
      Side: 'side',
      Isometric: 'isometric',
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      windowElement = openPlans.window({
        labelName: 'Window 1',
        windowHeight: 1.5,
        sillHeight: 0.8,
        glassColor: '#88ccee',
        frameColor: '#663300',
      });
    }

    function buildProjectionCamera(selectedView) {
      const windowWidth = Math.max(windowElement.windowWidth, 0.5);
      const windowHeight = Math.max(windowElement.windowHeight, 0.5);
      const sillHeight = Math.max(windowElement.sillHeight, 0);
      const targetY = sillHeight + windowHeight / 2;
      const span = Math.max(windowWidth, windowHeight + sillHeight, 1);
      const distance = Math.max(span * 4, 8);

      if (selectedView === 'front') {
        return {
          position: { x: 0, y: targetY, z: distance },
          target: { x: 0, y: targetY, z: 0 },
          up: { x: 0, y: 1, z: 0 },
          near: 0.1,
          projection_mode: 'Orthographic',
        };
      }

      if (selectedView === 'side') {
        return {
          position: { x: distance, y: targetY, z: 0 },
          target: { x: 0, y: targetY, z: 0 },
          up: { x: 0, y: 1, z: 0 },
          near: 0.1,
          projection_mode: 'Orthographic',
        };
      }

      return {
        position: { x: distance, y: distance * 0.75, z: distance },
        target: { x: 0, y: targetY, z: 0 },
        up: { x: 0, y: 1, z: 0 },
        near: 0.1,
        projection_mode: 'Orthographic',
      };
    }

    function buildExportPayload(selectedView) {
      if (selectedView === 'top') {
        return pdfGenerator.generate({
          elements: [windowElement],
          view: 'top',
        });
      }

      return pdfGenerator.generate({
        elements: [windowElement],
        view: 'isometric',
        camera: buildProjectionCamera(selectedView),
      });
    }

    function exportPayloadToPdf(payload, selectedView) {
      const width = Math.max(payload.bounds.width, 0.001);
      const height = Math.max(payload.bounds.height, 0.001);
      const orientation = width >= height ? 'landscape' : 'portrait';
      const pdf = new jsPDF({
        orientation,
        unit: 'mm',
        format: 'a4',
        compress: true,
      });

      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      const margin = 12;
      const headerHeight = 12;
      const drawableWidth = pageWidth - margin * 2;
      const drawableHeight = pageHeight - margin * 2 - headerHeight;
      const scale = Math.min(drawableWidth / width, drawableHeight / height);
      const offsetX = (pageWidth - width * scale) / 2;
      const offsetY = margin + headerHeight + (drawableHeight - height * scale) / 2;

      pdf.setFont('courier', 'bold');
      pdf.setFontSize(11);
      pdf.text(`${windowElement.labelName} - ${selectedView.toUpperCase()} VIEW`, margin, margin);

      for (const line of payload.lines) {
        const strokeColor = line.stroke_color
          ? line.stroke_color.map((channel) => Math.round(channel * 255))
          : [24, 24, 24];
        const strokeWidth = line.stroke_width !== undefined
          ? Math.max(0.15, Math.min(1.2, line.stroke_width * scale * 0.05))
          : 0.25;

        const x1 = offsetX + (line.start.x - payload.bounds.min.x) * scale;
        const y1 = offsetY + (payload.bounds.max.y - line.start.y) * scale;
        const x2 = offsetX + (line.end.x - payload.bounds.min.x) * scale;
        const y2 = offsetY + (payload.bounds.max.y - line.end.y) * scale;

        pdf.setDrawColor(strokeColor[0], strokeColor[1], strokeColor[2]);
        pdf.setLineWidth(strokeWidth);
        pdf.line(x1, y1, x2, y2);
      }

      pdf.save(`window-${selectedView}-view.pdf`);
    }

    function setUI() {
      const gui = new GUI();
      const windowFolder = gui.addFolder('Window');
      const windowControls = {
        'labelName': windowElement.labelName,
        'windowWidth': windowElement.windowWidth,
        'windowThickness': windowElement.windowThickness,
        'windowHeight': windowElement.windowHeight,
        'sillHeight': windowElement.sillHeight,
        'glassColor': windowElement.glassColor,
        'frameWidth': windowElement.frameWidth,
        'frameThickness': windowElement.frameThickness,
        'frameColor': windowElement.frameColor,
        'profileView': windowElement.profileView,
        'modelView': windowElement.modelView,
      };
      const exportControls = {
        'exportView': 'top',
        async exportPDF() {
          try {
            const payload = buildExportPayload(exportControls.exportView);
            exportPayloadToPdf(payload, exportControls.exportView);
          } catch (error) {
            console.error('PDF export failed:', error);
            alert(`PDF export failed for ${exportControls.exportView} view.`);
          }
        },
      };

      windowFolder.add(windowControls, 'labelName').name('Label Name').onChange((value) => {
        windowElement.labelName = value;
      });
      windowFolder.add(windowControls, 'windowWidth', 0.5, 5).name('Width').onChange((value) => {
        windowElement.windowWidth = value;
      });
      windowFolder.add(windowControls, 'windowThickness', 0.05, 0.5).name('Thickness').onChange((value) => {
        windowElement.windowThickness = value;
      });
      windowFolder.addColor(windowControls, 'glassColor').name('Glass Color').onChange((value) => {
        windowElement.glassColor = value;
      });
      windowFolder.add(windowControls, 'windowHeight', 0.5, 5).name('Height').onChange((value) => {
        windowElement.windowHeight = value;
      });
      windowFolder.add(windowControls, 'sillHeight', 0, 3).name('Sill Height').onChange((value) => {
        windowElement.sillHeight = value;
      });
      windowFolder.add(windowControls, 'frameWidth', 0.05, 0.5).name('Frame Width').onChange((value) => {
        windowElement.frameWidth = value;
      });
      windowFolder.add(windowControls, 'frameThickness', 0.05, 0.5).name('Frame Thickness').onChange((value) => {
        windowElement.frameThickness = value;
      });
      windowFolder.addColor(windowControls, 'frameColor').name('Frame Color').onChange((value) => {
        windowElement.frameColor = value;
      });
      windowFolder.add(windowControls, 'profileView').name('Show 2D View').onChange((value) => {
        windowElement.profileView = value;
      });
      windowFolder.add(windowControls, 'modelView').name('Show 3D View').onChange((value) => {
        windowElement.modelView = value;
      });

      const exportFolder = gui.addFolder('PDF Export');
      exportFolder.add(exportControls, 'exportView', EXPORT_VIEW_OPTIONS).name('View');
      exportFolder.add(exportControls, 'exportPDF').name('Export PDF');

      windowFolder.add({ fit: () => openPlans.fit?.(windowElement.id) }, 'fit').name('Fit');
      windowFolder.add({ getConfig: () => console.log(windowElement.getOPConfig()) }, 'getConfig').name('Get Config');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
