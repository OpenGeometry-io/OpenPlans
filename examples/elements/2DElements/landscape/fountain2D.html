<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Fountain 2D</title>
    <!-- MIXPANEL_TRACKING -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }

        .example-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            background: rgba(26, 26, 26, 0.8);
            padding: 12px 24px;
            z-index: 1000;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="example-title">Fountain 2D</div>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans, CameraMode } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let fountain;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            openPlans.CameraMode = CameraMode.Plan;

            fountain = openPlans.fountain2D({
                labelName: 'Garden Fountain',
                radius: 1.5
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Fountain 2D');
            folder.add({ labelName: fountain.labelName }, 'labelName').name('Label').onChange(v => fountain.labelName = v);
            folder.add({ radius: fountain.radius }, 'radius', 0.5, 3.0, 0.1).name('Radius').onChange(v => fountain.radius = v);
            folder.addColor({ basinColor: fountain.basinColor }, 'basinColor').name('Basin Color').onChange(v => fountain.basinColor = v);
            folder.addColor({ waterColor: fountain.waterColor }, 'waterColor').name('Water Color').onChange(v => fountain.waterColor = v);
            folder.add({ fit: () => openPlans.fit(fountain.id) }, 'fit').name('Fit');
            folder.add({ getConfig: () => console.log(fountain.getOPConfig()) }, 'getConfig').name('Get Config');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
