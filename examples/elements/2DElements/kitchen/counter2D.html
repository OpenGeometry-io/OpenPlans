<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Counter 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let counter;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            counter = openPlans.counter2D({
                labelName: 'Kitchen Counter',
                dimensions: { width: 2.0, depth: 0.6 }
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Counter 2D');
            folder.add({ labelName: counter.labelName }, 'labelName').name('Label').onChange(v => counter.labelName = v);
            folder.add({ width: counter.dimensions.width }, 'width', 1.0, 4.0, 0.1).name('Width').onChange(v => {
                counter.dimensions = { ...counter.dimensions, width: v };
            });
            folder.add({ depth: counter.dimensions.depth }, 'depth', 0.4, 0.8, 0.01).name('Depth').onChange(v => {
                counter.dimensions = { ...counter.dimensions, depth: v };
            });
            folder.addColor({ counterColor: counter.counterColor }, 'counterColor').name('Counter Color').onChange(v => counter.counterColor = v);
            folder.add({ fit: () => openPlans.fit(counter.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
