<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Cabinet 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let cabinet;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            cabinet = openPlans.cabinet2D({
                labelName: 'Kitchen Cabinet',
                dimensions: { width: 0.6, depth: 0.6 },
                doors: 2
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Cabinet 2D');
            folder.add({ labelName: cabinet.labelName }, 'labelName').name('Label').onChange(v => cabinet.labelName = v);
            folder.add({ width: cabinet.dimensions.width }, 'width', 0.4, 1.2, 0.01).name('Width').onChange(v => {
                cabinet.dimensions = { ...cabinet.dimensions, width: v };
            });
            folder.add({ depth: cabinet.dimensions.depth }, 'depth', 0.4, 0.8, 0.01).name('Depth').onChange(v => {
                cabinet.dimensions = { ...cabinet.dimensions, depth: v };
            });
            folder.add({ doors: cabinet.doors }, 'doors', 1, 4, 1).name('Doors').onChange(v => cabinet.doors = v);
            folder.addColor({ cabinetColor: cabinet.cabinetColor }, 'cabinetColor').name('Cabinet Color').onChange(v => cabinet.cabinetColor = v);
            folder.add({ fit: () => openPlans.fit(cabinet.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
