<!DOCTYPE html>
<html lang="en">

<head>
    <title>OpenPlans Kitchen Island 2D</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #app {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans } from './../../../../src/index.ts';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let openPlans;
        let island;

        async function init() {
            const container = document.getElementById('app');
            openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            island = openPlans.island2D({
                labelName: 'Kitchen Island',
            });
        }

        function setUI() {
            const gui = new GUI();
            const folder = gui.addFolder('Kitchen Island 2D');
            folder.add({ labelName: island.labelName }, 'labelName').name('Label').onChange(v => island.labelName = v);
            folder.add({ width: island.dimensions.width }, 'width', 1.2, 2.5, 0.01).name('Width').onChange(v => {
                island.dimensions = { ...island.dimensions, width: v };
            });
            folder.add({ depth: island.dimensions.depth }, 'depth', 0.6, 1.2, 0.01).name('Depth').onChange(v => {
                island.dimensions = { ...island.dimensions, depth: v };
            });
            folder.addColor({ islandColor: island.islandColor }, 'islandColor').name('Island Color').onChange(v => island.islandColor = v);
            folder.add({ fit: () => openPlans.fit(island.id) }, 'fit').name('Fit');
        }

        (async function () {
            await init();
            setUI();
        })();
    </script>
</body>

</html>
