<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Radius Dimension</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Dimension — Radius">
  <meta name="author" content="OpenPlans">
  <style>
    #app {
      cursor: unset !important;
    }
  </style>
</head>

<body>
  <div class="example-title">Radius Dimension</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let radiusDim;
    let circlePrimitive;

    const params = {
      centerX: 0,
      centerY: 0,
      centerZ: 0,
      radius: 5,
      angleDeg: 45,
      lineColor: '#000000',
      lineWidth: 2,
      fontSize: 2,
      fontColor: '#000000',
      label: '',
    };

    function hexToNumber(hex) {
      return parseInt(hex.replace('#', ''), 16);
    }

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Plan;

      circlePrimitive = openPlans.arc({
        center: [params.centerX, params.centerY, params.centerZ],
        radius: params.radius,
        startAngle: 0,
        endAngle: 2 * Math.PI,
        segments: 64,
        color: 0xaaaaaa,
      });

      radiusDim = openPlans.createDimension('radius');
      update();
    }

    function update() {
      radiusDim.center = [params.centerX, params.centerY, params.centerZ];
      radiusDim.radius = params.radius;
      radiusDim.angle = (params.angleDeg * Math.PI) / 180;
      radiusDim.dimColor = hexToNumber(params.lineColor);
      radiusDim.lineWidth = params.lineWidth;
      radiusDim.fontSize = params.fontSize;
      radiusDim.fontColor = hexToNumber(params.fontColor);
      radiusDim.label = params.label || undefined;

      circlePrimitive.arcCenter = [params.centerX, params.centerY, params.centerZ];
      circlePrimitive.arcRadius = params.radius;
    }

    function setUI() {
      const gui = new GUI();

      const centerFolder = gui.addFolder('Center');
      centerFolder.add(params, 'centerX', -10, 10, 0.1).name('X').onChange(update);
      centerFolder.add(params, 'centerY', -10, 10, 0.1).name('Y').onChange(update);
      centerFolder.add(params, 'centerZ', -10, 10, 0.1).name('Z').onChange(update);
      centerFolder.open();

      gui.add(params, 'radius', 0.5, 20, 0.1).name('Radius').onChange(update);
      gui.add(params, 'angleDeg', 0, 360, 1).name('Leader Angle (°)').onChange(update);

      gui.addColor(params, 'lineColor').name('Line Color').onChange(update);
      gui.add(params, 'lineWidth', 1, 10, 0.5).name('Line Width').onChange(update);

      const labelFolder = gui.addFolder('Label');
      labelFolder.add(params, 'label').name('Text (blank = auto)').onChange(update);
      labelFolder.add(params, 'fontSize', 1, 10, 0.5).name('Font Size').onChange(update);
      labelFolder.addColor(params, 'fontColor').name('Font Color').onChange(update);
      labelFolder.open();
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
