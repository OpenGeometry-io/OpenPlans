<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Logo Block</title>
  <link rel="stylesheet" href="../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Layout — Logo Block">
  <meta name="author" content="OpenPlans">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: 'Space Mono', monospace;
    }

    .placeholder {
      text-align: center;
      padding: 60px 40px;
      border: 2px dashed #ccc;
      max-width: 480px;
    }

    .placeholder h2 {
      font-size: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 16px;
      color: #1a1a1a;
    }

    .placeholder p {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: #fff8e6;
      border: 1px solid #ffcc00;
      color: #996600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>
  <div class="example-title">Logo Block</div>
  <div class="placeholder">
    <div class="badge">In Progress</div>
    <h2>Logo Block</h2>
    <p>
      <code>LogoInfoBlock</code> renders an image, text, logo, or QR-code cell
      inside a paper frame. This example will be available once
      <code>LogoInfoBlock</code> is exported from the <code>@opengeometry/openplans</code> package.
    </p>
  </div>
</body>

</html>
