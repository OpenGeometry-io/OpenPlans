<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlan Viewport Block</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Viewport Block Demo">
  <meta name="author" content="Vishwajeet Mane">
  
</head>

<body>
  <div class="example-title">Viewport Block</div>
  <div id="app">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let topViewport, frontViewport;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;
      openPlans.openThree.toggleTheme('darkBlue');

      // ── Scene content ──
      // Add some elements so the viewports have something to render
      const door = openPlans.baseDoor();
      door.position.set(0, 0, 0);

      // const slab = openPlans.baseSlab();
      // slab.position.set(3, 0, 0);

      // ── Viewport: Top view ──
      topViewport = openPlans.viewportBlock({
        id: 'viewport-top',
        size: [12, 8],
        position: [20, 0.01, 0],
        viewCamera: 'top',
        viewCenter: [0, 0, 0],
        viewSize: 8,
        viewportBackground: 0xffffff
      });

      // ── Viewport: Front view ──
      frontViewport = openPlans.viewportBlock({
        id: 'viewport-front',
        size: [12, 8],
        position: [20, 0.01, -12],
        viewCamera: 'front',
        viewCenter: [0, 0, 0],
        viewSize: 8,
        viewportBackground: 0xffffff
      });
    }

    function setUI() {
      const gui = new GUI();

      // Top viewport controls
      const topFolder = gui.addFolder('Top Viewport');
      const topControls = {
        viewCamera: 'top',
        centerX: 0,
        centerY: 0,
        centerZ: 0,
        viewSize: 8,
      };

      topFolder.add(topControls, 'viewCamera', ['top', 'front', 'right', 'left', 'back']).name('View').onChange((v) => {
        topViewport.viewCamera = v;
      });
      topFolder.add(topControls, 'centerX', -50, 50).name('Center X').onChange((v) => {
        topViewport.viewCenter = [v, topControls.centerY, topControls.centerZ];
      });
      topFolder.add(topControls, 'centerY', -50, 50).name('Center Y').onChange((v) => {
        topControls.centerY = v;
        topViewport.viewCenter = [topControls.centerX, v, topControls.centerZ];
      });
      topFolder.add(topControls, 'centerZ', -50, 50).name('Center Z').onChange((v) => {
        topControls.centerZ = v;
        topViewport.viewCenter = [topControls.centerX, topControls.centerY, v];
      });
      topFolder.add(topControls, 'viewSize', 1, 50).name('Zoom').onChange((v) => {
        topViewport.viewSize = v;
      });

      // Front viewport controls
      const frontFolder = gui.addFolder('Front Viewport');
      const frontControls = {
        viewCamera: 'front',
        centerX: 0,
        centerY: 0,
        centerZ: 0,
        viewSize: 8,
      };

      frontFolder.add(frontControls, 'viewCamera', ['top', 'front', 'right', 'left', 'back']).name('View').onChange((v) => {
        frontViewport.viewCamera = v;
      });
      frontFolder.add(frontControls, 'centerX', -50, 50).name('Center X').onChange((v) => {
        frontControls.centerX = v;
        frontViewport.viewCenter = [v, frontControls.centerY, frontControls.centerZ];
      });
      frontFolder.add(frontControls, 'centerY', -50, 50).name('Center Y').onChange((v) => {
        frontControls.centerY = v;
        frontViewport.viewCenter = [frontControls.centerX, v, frontControls.centerZ];
      });
      frontFolder.add(frontControls, 'centerZ', -50, 50).name('Center Z').onChange((v) => {
        frontControls.centerZ = v;
        frontViewport.viewCenter = [frontControls.centerX, frontControls.centerY, v];
      });
      frontFolder.add(frontControls, 'viewSize', 1, 50).name('Zoom').onChange((v) => {
        frontViewport.viewSize = v;
      });
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
