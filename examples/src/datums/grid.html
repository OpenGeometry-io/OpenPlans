<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Grid Datum</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Datum — Structural Grid">
  <meta name="author" content="OpenPlans">
  <style>
    #app {
      cursor: unset !important;
    }
  </style>
</head>

<body>
  <div class="example-title">Structural Grid</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode, Grid } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let gridInstance;

    const params = {
      uBays: 4,
      vBays: 3,
      bay: 6,
      bubbleSize: 0.8,
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Plan;

      rebuild();
    }

    function rebuild() {
      if (gridInstance) {
        gridInstance.removeFromParent();
        gridInstance.dispose();
      }
      const uSpacings = new Array(params.uBays).fill(params.bay);
      const vSpacings = new Array(params.vBays).fill(params.bay);
      gridInstance = openPlans.grid({
        ...Grid.rectangular({
          uSpacings,
          vSpacings,
          origin: [0, 0],
          elevation: 0,
          head: { diameter: params.bubbleSize, fontSize: 0.3 },
        }),
        labelName: 'Primary Grid',
      });
    }

    function setUI() {
      const gui = new GUI();
      gui.add(params, 'uBays', 1, 10, 1).name('U (numeric) bays').onChange(rebuild);
      gui.add(params, 'vBays', 1, 10, 1).name('V (alpha) bays').onChange(rebuild);
      gui.add(params, 'bay', 2, 12, 0.5).name('Bay size (m)').onChange(rebuild);
      gui.add(params, 'bubbleSize', 0.3, 2, 0.1).name('Bubble Ø').onChange(rebuild);

      const info = gui.addFolder('ISO 5457 / US NCS');
      info.add({ note: 'I and O skipped on alpha axes' }, 'note').disable();
      info.open();
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
