<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Level Datum</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Datum — Level">
  <meta name="author" content="OpenPlans">
  <style>
    body { margin: 0; overflow: hidden; }
    #app { width: 100%; height: 100vh; cursor: unset !important; }
    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Level Datum</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode } from './../../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    const levels = [];

    const params = {
      gfElevation: 0,
      l01Elevation: 3.2,
      l02Elevation: 6.4,
      extentMin: -5,
      extentMax: 5,
      drawTick: false,
      headSide: 'end',
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Model;

      levels.push(openPlans.level({
        labelName: 'GF',
        headLabel: 'GF  ±0.00',
        elevation: params.gfElevation,
        extents: [[params.extentMin, 0], [params.extentMax, 0]],
        headSide: params.headSide,
      }));
      levels.push(openPlans.level({
        labelName: 'L01',
        headLabel: 'L01  +3.20',
        elevation: params.l01Elevation,
        extents: [[params.extentMin, 0], [params.extentMax, 0]],
        headSide: params.headSide,
      }));
      levels.push(openPlans.level({
        labelName: 'L02',
        headLabel: 'L02  +6.40',
        elevation: params.l02Elevation,
        extents: [[params.extentMin, 0], [params.extentMax, 0]],
        headSide: params.headSide,
      }));
    }

    function rebuildAll() {
      const elevations = [params.gfElevation, params.l01Elevation, params.l02Elevation];
      levels.forEach((level, i) => {
        level.setOPConfig({
          elevation: elevations[i],
          extents: [[params.extentMin, 0], [params.extentMax, 0]],
          headSide: params.headSide,
          drawTick: params.drawTick,
        });
      });
    }

    function setUI() {
      const gui = new GUI();
      gui.add(params, 'gfElevation', -5, 20, 0.1).name('GF Elevation').onChange(rebuildAll);
      gui.add(params, 'l01Elevation', -5, 20, 0.1).name('L01 Elevation').onChange(rebuildAll);
      gui.add(params, 'l02Elevation', -5, 20, 0.1).name('L02 Elevation').onChange(rebuildAll);
      gui.add(params, 'extentMin', -30, 0, 0.5).name('Extent Min').onChange(rebuildAll);
      gui.add(params, 'extentMax', 0, 30, 0.5).name('Extent Max').onChange(rebuildAll);
      gui.add(params, 'headSide', ['start', 'end', 'both', 'none']).name('Head Side').onChange(rebuildAll);
      gui.add(params, 'drawTick').name('Draw Tick').onChange(rebuildAll);
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
