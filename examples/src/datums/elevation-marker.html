<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Elevation Marker</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Datum — Elevation Marker">
  <meta name="author" content="OpenPlans">
  <style>
    #app {
      cursor: unset !important;
    }
  </style>
</head>

<body>
  <div class="example-title">Elevation Marker</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let single;
    let cluster;

    const params = {
      cluster: true,
      direction: 'N',
      drawingNumber: '1',
      sheetNumber: 'A-201',
      bubbleRadius: 0.5,
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Plan;

      single = openPlans.elevationMarker({
        labelName: 'Single Marker',
        position: [-5, 0, 0],
        direction: params.direction,
        cluster: false,
        head: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
        bubbleRadius: params.bubbleRadius,
      });

      cluster = openPlans.elevationMarker({
        labelName: 'Clustered Marker',
        position: [5, 0, 0],
        cluster: true,
        head: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
        bubbleRadius: params.bubbleRadius,
      });
    }

    function rebuild() {
      single.setOPConfig({
        direction: params.direction,
        head: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
        bubbleRadius: params.bubbleRadius,
      });
      cluster.setOPConfig({
        head: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
        bubbleRadius: params.bubbleRadius,
      });
    }

    function setUI() {
      const gui = new GUI();
      gui.add(params, 'direction', ['N', 'S', 'E', 'W']).name('Single direction').onChange(rebuild);
      gui.add(params, 'bubbleRadius', 0.2, 2, 0.1).name('Bubble radius').onChange(rebuild);
      const head = gui.addFolder('Head');
      head.add(params, 'drawingNumber').name('Drawing #').onChange(rebuild);
      head.add(params, 'sheetNumber').name('Sheet #').onChange(rebuild);
      head.open();
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
