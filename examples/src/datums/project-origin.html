<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Project Origin</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Datum — Project Origin / Benchmark">
  <meta name="author" content="OpenPlans">
  <style>
    body { margin: 0; overflow: hidden; }
    #app { width: 100%; height: 100vh; cursor: unset !important; }
    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Project Origin</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode } from './../../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let origin;

    const params = {
      x: 0,
      y: 0,
      z: 0,
      rotationDeg: 0,
      gizmoSize: 1.5,
      showBenchmark: false,
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Model;

      origin = openPlans.projectOrigin({
        labelName: 'Project Zero',
        position: [params.x, params.y, params.z],
        rotationY: (params.rotationDeg * Math.PI) / 180,
        gizmoSize: params.gizmoSize,
        showBenchmark: params.showBenchmark,
      });
    }

    function rebuild() {
      origin.setOPConfig({
        position: [params.x, params.y, params.z],
        rotationY: (params.rotationDeg * Math.PI) / 180,
        gizmoSize: params.gizmoSize,
        showBenchmark: params.showBenchmark,
      });
    }

    function setUI() {
      const gui = new GUI();
      const pos = gui.addFolder('Position');
      pos.add(params, 'x', -10, 10, 0.1).onChange(rebuild);
      pos.add(params, 'y', -5, 10, 0.1).onChange(rebuild);
      pos.add(params, 'z', -10, 10, 0.1).onChange(rebuild);
      pos.open();

      gui.add(params, 'rotationDeg', 0, 360, 1).name('Rotation (°)').onChange(rebuild);
      gui.add(params, 'gizmoSize', 0.3, 5, 0.1).name('Gizmo size').onChange(rebuild);
      gui.add(params, 'showBenchmark').name('Benchmark symbol').onChange(rebuild);
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
