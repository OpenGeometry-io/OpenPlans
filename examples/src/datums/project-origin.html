<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Project Origin</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Datum — Project Origin / Benchmark">
  <meta name="author" content="OpenPlans">
  <style>
    #app {
      cursor: unset !important;
    }
  </style>
</head>

<body>
  <div class="example-title">Project Origin</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let origin;

    const params = {
      x: 0,
      y: 0,
      z: 0,
      rotationDeg: 0,
      gizmoSize: 1.5,
      showBenchmark: false,
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Model;

      origin = openPlans.projectOrigin({
        labelName: 'Project Zero',
        position: [params.x, params.y, params.z],
        rotationY: (params.rotationDeg * Math.PI) / 180,
        gizmoSize: params.gizmoSize,
        showBenchmark: params.showBenchmark,
      });
    }

    function rebuild() {
      origin.setOPConfig({
        position: [params.x, params.y, params.z],
        rotationY: (params.rotationDeg * Math.PI) / 180,
        gizmoSize: params.gizmoSize,
        showBenchmark: params.showBenchmark,
      });
    }

    function setUI() {
      const gui = new GUI();
      const pos = gui.addFolder('Position');
      pos.add(params, 'x', -10, 10, 0.1).onChange(rebuild);
      pos.add(params, 'y', -5, 10, 0.1).onChange(rebuild);
      pos.add(params, 'z', -10, 10, 0.1).onChange(rebuild);
      pos.open();

      gui.add(params, 'rotationDeg', 0, 360, 1).name('Rotation (°)').onChange(rebuild);
      gui.add(params, 'gizmoSize', 0.3, 5, 0.1).name('Gizmo size').onChange(rebuild);
      gui.add(params, 'showBenchmark').name('Benchmark symbol').onChange(rebuild);
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
