<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — All Datums</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans — combined datum showcase">
  <meta name="author" content="OpenPlans">
  <style>
    body { margin: 0; overflow: hidden; }
    #app { width: 100%; height: 100vh; cursor: unset !important; }
    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">All Datums</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode, Grid } from './../../../src/index.ts';

    async function init() {
      const container = document.getElementById('app');
      const openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Model;

      openPlans.projectOrigin({
        labelName: 'Project Zero',
        position: [0, 0, 0],
        gizmoSize: 1.5,
        showBenchmark: true,
      });

      openPlans.grid({
        ...Grid.rectangular({
          uSpacings: [6, 6, 6, 6],
          vSpacings: [5, 5, 5],
          origin: [-12, -7.5],
          elevation: 0,
          head: { diameter: 0.8, fontSize: 0.3 },
        }),
        labelName: 'Primary Grid',
      });

      openPlans.level({
        labelName: 'GF',
        headLabel: 'GF  ±0.00',
        elevation: 0,
        extents: [[-14, -9], [14, -9]],
        headSide: 'both',
      });
      openPlans.level({
        labelName: 'L01',
        headLabel: 'L01  +3.20',
        elevation: 3.2,
        extents: [[-14, -9], [14, -9]],
        headSide: 'both',
      });
      openPlans.level({
        labelName: 'Roof',
        headLabel: 'Roof  +6.40',
        elevation: 6.4,
        extents: [[-14, -9], [14, -9]],
        headSide: 'both',
      });

      openPlans.referencePlane({
        labelName: 'Entry Axis',
        origin: [0, 1.5, 0],
        normal: [1, 0, 0],
        extents: [3, 3],
        showBody: true,
      });

      openPlans.sectionLine({
        labelName: 'Section A-A',
        start: [-10, 0, 4],
        end: [10, 0, 4],
        headStart: { drawingNumber: 'A', sheetNumber: 'A-301' },
        headEnd: { drawingNumber: 'A', sheetNumber: 'A-301' },
      });

      openPlans.elevationMarker({
        labelName: 'North Elevation',
        position: [0, 0, -6],
        cluster: true,
        head: { drawingNumber: '1', sheetNumber: 'A-201' },
        bubbleRadius: 0.55,
      });
    }

    init();
  </script>
</body>

</html>
