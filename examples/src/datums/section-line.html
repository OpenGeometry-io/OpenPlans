<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — Section Line</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans Datum — Section Line">
  <meta name="author" content="OpenPlans">
  <style>
    body { margin: 0; overflow: hidden; }
    #app { width: 100%; height: 100vh; cursor: unset !important; }
    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Section Line</div>
  <div id="app"></div>
  <script type="module">
    import { OpenPlans, CameraMode } from './../../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let section;

    const params = {
      startX: -5,
      startZ: 0,
      endX: 5,
      endZ: 0,
      flip: false,
      drawingNumber: 'A',
      sheetNumber: 'A-301',
      depthNear: 0,
      depthFar: 12,
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Plan;

      section = openPlans.sectionLine({
        labelName: 'Section A-A',
        start: [params.startX, 0, params.startZ],
        end: [params.endX, 0, params.endZ],
        depth: { near: params.depthNear, far: params.depthFar },
        flip: params.flip,
        headStart: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
        headEnd: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
      });
    }

    function rebuild() {
      section.setOPConfig({
        start: [params.startX, 0, params.startZ],
        end: [params.endX, 0, params.endZ],
        depth: { near: params.depthNear, far: params.depthFar },
        flip: params.flip,
        headStart: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
        headEnd: { drawingNumber: params.drawingNumber, sheetNumber: params.sheetNumber },
      });
    }

    function setUI() {
      const gui = new GUI();
      const start = gui.addFolder('Start');
      start.add(params, 'startX', -15, 15, 0.1).onChange(rebuild);
      start.add(params, 'startZ', -15, 15, 0.1).onChange(rebuild);
      start.open();

      const end = gui.addFolder('End');
      end.add(params, 'endX', -15, 15, 0.1).onChange(rebuild);
      end.add(params, 'endZ', -15, 15, 0.1).onChange(rebuild);
      end.open();

      const depth = gui.addFolder('View Depth');
      depth.add(params, 'depthNear', 0, 20, 0.5).onChange(rebuild);
      depth.add(params, 'depthFar', 1, 50, 0.5).onChange(rebuild);

      gui.add(params, 'flip').name('Flip direction').onChange(rebuild);

      const head = gui.addFolder('Section Head');
      head.add(params, 'drawingNumber').name('Drawing #').onChange(rebuild);
      head.add(params, 'sheetNumber').name('Sheet #').onChange(rebuild);
      head.open();
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
