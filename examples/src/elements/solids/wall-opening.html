<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Wall Opening</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: "JetBrains Mono", monospace;
    }
  </style>
</head>

<body>
  <div class="example-title">Wall Opening</div>
  <div id="app">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let singleWall, opening, door, windowElement;
    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      openPlans.toggleGrid(false);

      // Diagonal-wall regression fixture: a 10m wall at 45 degrees in the XZ plane.
      // With wall-local hosting, the door at u=4.5 must sit centered on the wall
      // centerline aligned with the wall direction (world ~ (3.18, 0, 3.18)), not
      // off-wall along world X as the old world-space coord bug produced.
      const DIAG = 10 / Math.SQRT2; // ~7.07
      singleWall = openPlans.singleWall({
        points: [
          [0, 0, 0],
          [DIAG, 0, DIAG],
        ],
        height: 5
      });
      singleWall.outline = true;

      opening = openPlans.opening({
        points: [
          [1, 0, 0],
          [4, 0, 0],
        ],
        height: 3,
        thickness: 1,
        baseHeight: 0.5,
      });
      singleWall.attachOpening(opening);

      // Adding Door — wall-local u = 4.5 m along the wall.
      door = openPlans.door({
        hostWallId: singleWall.ogid,
        stationLocal: { u: 4.5, h: 0 },
        panelDimensions: { width: 1, thickness: 0.3 },
        frameDimensions: { width: 0.2, thickness: 0.3 },
        doorHeight: 2.1,
        doorColor: '#cc7a00',
        frameColor: '#654321'
      });
      singleWall.attachDoor(door);
      door.modelView = false;

      // Adding Window — wall-local u = 7.5 m along the wall.
      windowElement = openPlans.window({
        hostWallId: singleWall.ogid,
        stationLocal: { u: 7.5 },
        windowDimensions: { width: 1.6, thickness: 0.2 },
        frameDimensions: { width: 0.14, thickness: 0.2 },
        windowHeight: 1.2,
        sillHeight: 1,
        glassColor: '#8fbfdf',
        frameColor: '#2f2f2f'
      });
      singleWall.attachWindow(windowElement);
      windowElement.modelView = false;

      openPlans.fitToView([singleWall, opening, door, windowElement]);

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      const wallFolder = gui.addFolder('Wall');
      wallFolder.open();

      const params = {
        outline: true,
        start: { x: 0, y: 0, z: 0 },
        end: { x: 1.5, y: 0, z: 1.5 },
        isProfileView: true,
        isModelView: true,
      };

      wallFolder.add(params, 'outline').name('Outline').onChange((value) => {
        if (singleWall) singleWall.outline = value;
      });
      wallFolder.add(params.start, 'x', -10, 10, 0.1).name('Start X').onChange((value) => {
        if (singleWall) singleWall.start = [value, params.start.y, params.start.z];
      });
      wallFolder.add(params.start, 'y', -10, 10, 0.1).name('Start Y').onChange((value) => {
        if (singleWall) singleWall.start = [params.start.x, value, params.start.z];
      });
      wallFolder.add(params.start, 'z', -10, 10, 0.1).name('Start Z').onChange((value) => {
        if (singleWall) singleWall.start = [params.start.x, params.start.y, value];
      });
      wallFolder.add(params.end, 'x', -10, 10, 0.1).name('End X').onChange((value) => {
        if (singleWall) singleWall.end = [value, params.end.y, params.end.z];
      });
      wallFolder.add(params.end, 'y', -10, 10, 0.1).name('End Y').onChange((value) => {
        if (singleWall) singleWall.end = [params.end.x, value, params.end.z];
      });
      wallFolder.add(params.end, 'z', -10, 10, 0.1).name('End Z').onChange((value) => {
        if (singleWall) singleWall.end = [params.end.x, params.end.y, value];
      });
      wallFolder.add(params, 'isProfileView').name('Profile View').onChange((value) => {
        if (singleWall) singleWall.profileView = value;
      });
      wallFolder.add(params, 'isModelView').name('Model View').onChange((value) => {
        if (singleWall) singleWall.modelView = value;
      });

      wallFolder.add({
        preloadWall: () => {
          const config = {
            ogid: '86302abc-d71e-47be-affc-dc05de1db8fe',
            points: [
              [3, 0, 0],
              [5, 0, -5],
            ],
            color: '#ff0000',
          };
          const preloadConfig = openPlans.singleWall(config);
          preloadConfig.outline = params.outline;

          console.log('Preloaded Wall Config:', preloadConfig.getOPConfig());
        }
      }, 'preloadWall');

      wallFolder.add({
        logConfig: () => {
          if (singleWall) {
            console.log('Current Wall Config:', singleWall.getOPConfig());
          } else {
            console.log('No wall created yet.');
          }
        }
      }, 'logConfig');

      wallFolder.add({
        fit: () => {
          const focusElements = [singleWall, opening, door, windowElement].filter(Boolean);
          if (focusElements.length > 0) openPlans.fitToView(focusElements);
        }
      }, 'fit').name('Fit');
      wallFolder.add({ getConfig: () => console.log(singleWall.getOPConfig()) }, 'getConfig').name('Get Config');
    
      
      const openingFolder = gui.addFolder('Opening');
      openingFolder.open();
      const openingParams = {
        start: { x: 1, y: 0, z: 0 },
        end: { x: 4, y: 0, z: 0 },
        thickness: 1,
        height: 3,
        baseHeight: 0.5,
        profileView: true,
        modelView: true,
      };

      openingFolder.add(openingParams.start, 'x', -10, 10, 0.1).name('Start X').onChange((value) => {
        if (opening) opening.start = [value, openingParams.start.y, openingParams.start.z];
      });
      openingFolder.add(openingParams.start, 'y', -10, 10, 0.1).name('Start Y').onChange((value) => {
        if (opening) opening.start = [openingParams.start.x, value, openingParams.start.z];
      });
      openingFolder.add(openingParams.start, 'z', -10, 10, 0.1).name('Start Z').onChange((value) => {
        if (opening) opening.start = [openingParams.start.x, openingParams.start.y, value];
      });
      openingFolder.add(openingParams.end, 'x', -10, 10, 0.1).name('End X').onChange((value) => {
        if (opening) opening.end = [value, openingParams.end.y, openingParams.end.z];
      });
      openingFolder.add(openingParams.end, 'y', -10, 10, 0.1).name('End Y').onChange((value) => {
        if (opening) opening.end = [openingParams.end.x, value, openingParams.end.z];
      });
      openingFolder.add(openingParams.end, 'z', -10, 10, 0.1).name('End Z').onChange((value) => {
        if (opening) opening.end = [openingParams.end.x, openingParams.end.y, value]; 
      });
      openingFolder.add(openingParams, 'thickness', 0.1, 2, 0.1).name('Thickness').onChange((value) => {
        if (opening) opening.thickness = value;
      });
      openingFolder.add(openingParams, 'height', 0.1, 5, 0.1).name('Height').onChange((value) => {
        if (opening) opening.height = value;
      });
      openingFolder.add(openingParams, 'baseHeight', 0, 5, 0.1).name('Base Height').onChange((value) => {
        if (opening) opening.baseHeight = value;
      });
      openingFolder.add(openingParams, 'profileView').name('Profile View').onChange((value) => {
        if (opening) opening.profileView = value;
      });
      openingFolder.add(openingParams, 'modelView').name('Model View').onChange((value) => {
        if (opening) opening.modelView = value;
      });

      const windowFolder = gui.addFolder('Window');
      windowFolder.open();
      const windowParams = {
        stationLocal: { u: 7.5 },
        windowDimensions: { width: 1.6, thickness: 0.2 },
        frameDimensions: { width: 0.14, thickness: 0.2 },
        windowHeight: 1.2,
        sillHeight: 1,
        glassColor: '#8fbfdf',
        frameColor: '#2f2f2f',
        outline: true,
        profileView: true,
        modelView: false,
      };

      windowFolder.add(windowParams.stationLocal, 'u', -10, 20, 0.1).name('Station U (along wall)').onChange((value) => {
        if (windowElement) windowElement.station = { u: value };
      });
      windowFolder.add(windowParams.windowDimensions, 'width', 0.2, 4, 0.1).name('Width').onChange((value) => {
        if (windowElement) windowElement.windowWidth = value;
      });
      windowFolder.add(windowParams.windowDimensions, 'thickness', 0.05, 1, 0.05).name('Thickness').onChange((value) => {
        if (windowElement) windowElement.windowThickness = value;
      });
      windowFolder.add(windowParams.frameDimensions, 'width', 0.05, 0.6, 0.05).name('Frame Width').onChange((value) => {
        if (windowElement) windowElement.frameWidth = value;
      });
      windowFolder.add(windowParams.frameDimensions, 'thickness', 0.05, 0.6, 0.05).name('Frame Thickness').onChange((value) => {
        if (windowElement) windowElement.frameThickness = value;
      });
      windowFolder.add(windowParams, 'windowHeight', 0.2, 4, 0.1).name('Height').onChange((value) => {
        if (windowElement) windowElement.windowHeight = value;
      });
      windowFolder.add(windowParams, 'sillHeight', 0, 3, 0.1).name('Sill Height').onChange((value) => {
        if (windowElement) windowElement.sillHeight = value;
      });
      windowFolder.addColor(windowParams, 'glassColor').name('Glass Color').onChange((value) => {
        if (windowElement) windowElement.glassColor = value;
      });
      windowFolder.addColor(windowParams, 'frameColor').name('Frame Color').onChange((value) => {
        if (windowElement) windowElement.frameColor = value;
      });
      windowFolder.add(windowParams, 'outline').name('Outline').onChange((value) => {
        if (windowElement) windowElement.outline = value;
      });
      windowFolder.add(windowParams, 'profileView').name('Profile View').onChange((value) => {
        if (windowElement) windowElement.profileView = value;
      });
      windowFolder.add(windowParams, 'modelView').name('Model View').onChange((value) => {
        if (windowElement) windowElement.modelView = value;
      });
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
