<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Wall Opening</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: "JetBrains Mono", monospace;
    }
  </style>
</head>

<body>
  <div class="example-title">Wall Opening</div>
  <div id="app">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let singleWall, opening, door, windowElement;
    let openPlans;

    // Diagonal-wall regression fixture: a 10m wall at 45° in the XZ plane.
    // With wall-local hosting, the door at alongWall=4.5 must sit centered on
    // the wall axis (world ~ (3.18, 0, 3.18)), not off-wall along world X
    // as the old world-space-coord bug produced.
    const DIAG = 10 / Math.SQRT2; // ~7.07

    // Initial values are kept in module scope so the GUI defaults match the
    // geometry that gets created (no out-of-sync sliders).
    const wallStart = [0, 0, 0];
    const wallEnd   = [DIAG, 0, DIAG];
    const wallHeight    = 5;
    const wallThickness = 0.3;

    // Layout along the wall (length DIAG ≈ 7.07 m). Openings are placed so
    // their full footprints stay strictly inside the wall and never overlap
    // each other — overlapping or out-of-bounds CSG cutters produce
    // non-manifold geometry under the current kernel.
    //
    //  alongWall:   0 ── 1 ── 2.5 ── 3.0 ── 4.0 ── 4.7 ── 6.3 ── 7.07
    //  occupancy:        [opening ]  ╴ [door ]  ╴  [window ]
    const openingPoints = [
      [1.0, 0, 0],   // wall-local (alongWall, acrossWall, elevation)
      [2.5, 0, 0],
    ];
    const openingThickness  = 1;
    const openingHeightVal  = 3;
    const openingBaseHeight = 0.5;

    const doorInitial = {
      stationLocal:    { alongWall: 3.5, elevation: 0 },
      panelDimensions: { width: 0.9,  thickness: 0.04 },  // 40 mm panel
      frameDimensions: { width: 0.05, thickness: 0.3  },  // 50 mm casing; depth = wall thickness when hosted
      doorHeight:        2.1,
      doorQuadrant:      1,
      swingAngleDegrees: 90,
      doorColor:         '#cc7a00',
      frameColor:        '#654321',
    };

    const windowInitial = {
      stationLocal:     { alongWall: 5.5 },
      windowDimensions: { width: 1.4,  thickness: 0.2  },
      frameDimensions:  { width: 0.12, thickness: 0.2  },
      windowHeight:     1.2,
      sillHeight:       1.0,
      glassColor:       '#8fbfdf',
      frameColor:       '#2f2f2f',
    };

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;
      openPlans.toggleGrid(false);

      singleWall = openPlans.singleWall({
        points:    [wallStart, wallEnd],
        height:    wallHeight,
        thickness: wallThickness,
      });
      singleWall.outline = true;

      opening = openPlans.opening({
        points:     openingPoints,
        height:     openingHeightVal,
        thickness:  openingThickness,
        baseHeight: openingBaseHeight,
      });
      singleWall.attachOpening(opening);

      door = openPlans.door({
        hostWallId: singleWall.ogid,
        ...doorInitial,
      });
      singleWall.attachDoor(door);

      windowElement = openPlans.window({
        hostWallId: singleWall.ogid,
        ...windowInitial,
      });
      singleWall.attachWindow(windowElement);

      openPlans.fitToView([singleWall, opening, door, windowElement]);

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      // ── Wall ───────────────────────────────────────────────────────────────
      const wallFolder = gui.addFolder('Wall');
      wallFolder.open();
      const wallParams = {
        outline:       true,
        start:         { x: wallStart[0], y: wallStart[1], z: wallStart[2] },
        end:           { x: wallEnd[0],   y: wallEnd[1],   z: wallEnd[2]   },
        thickness:     wallThickness,
        height:        wallHeight,
        isProfileView: true,
        isModelView:   true,
      };

      wallFolder.add(wallParams, 'outline').name('Outline').onChange((value) => {
        if (singleWall) singleWall.outline = value;
      });
      wallFolder.add(wallParams.start, 'x', -10, 10, 0.1).name('Start X').onChange((value) => {
        if (singleWall) singleWall.start = [value, wallParams.start.y, wallParams.start.z];
      });
      wallFolder.add(wallParams.start, 'y', -10, 10, 0.1).name('Start Y').onChange((value) => {
        if (singleWall) singleWall.start = [wallParams.start.x, value, wallParams.start.z];
      });
      wallFolder.add(wallParams.start, 'z', -10, 10, 0.1).name('Start Z').onChange((value) => {
        if (singleWall) singleWall.start = [wallParams.start.x, wallParams.start.y, value];
      });
      wallFolder.add(wallParams.end, 'x', -10, 10, 0.1).name('End X').onChange((value) => {
        if (singleWall) singleWall.end = [value, wallParams.end.y, wallParams.end.z];
      });
      wallFolder.add(wallParams.end, 'y', -10, 10, 0.1).name('End Y').onChange((value) => {
        if (singleWall) singleWall.end = [wallParams.end.x, value, wallParams.end.z];
      });
      wallFolder.add(wallParams.end, 'z', -10, 10, 0.1).name('End Z').onChange((value) => {
        if (singleWall) singleWall.end = [wallParams.end.x, wallParams.end.y, value];
      });
      wallFolder.add(wallParams, 'thickness', 0.05, 1, 0.01).name('Wall Thickness').onChange((value) => {
        if (singleWall) singleWall.wallThickness = value;
      });
      wallFolder.add(wallParams, 'height', 0.5, 8, 0.1).name('Wall Height').onChange((value) => {
        if (singleWall) singleWall.wallHeight = value;
      });
      wallFolder.add(wallParams, 'isProfileView').name('Profile View').onChange((value) => {
        if (singleWall) singleWall.profileView = value;
      });
      wallFolder.add(wallParams, 'isModelView').name('Model View').onChange((value) => {
        if (singleWall) singleWall.modelView = value;
      });

      wallFolder.add({
        fit: () => {
          const focusElements = [singleWall, opening, door, windowElement].filter(Boolean);
          if (focusElements.length > 0) openPlans.fitToView(focusElements);
        }
      }, 'fit').name('Fit');
      wallFolder.add({ getConfig: () => console.log(singleWall.getOPConfig()) }, 'getConfig').name('Get Config');

      // ── Opening (generic, not a door/window) ───────────────────────────────
      // After bindHostFrame, opening.points are wall-local (alongWall, acrossWall, elevation).
      // The slider labels reflect that, not world (x, y, z).
      const openingFolder = gui.addFolder('Opening (generic)');
      openingFolder.open();
      const openingParams = {
        start:       { alongWall: openingPoints[0][0], acrossWall: openingPoints[0][1], elevation: openingPoints[0][2] },
        end:         { alongWall: openingPoints[1][0], acrossWall: openingPoints[1][1], elevation: openingPoints[1][2] },
        thickness:   openingThickness,
        height:      openingHeightVal,
        baseHeight:  openingBaseHeight,
        profileView: true,
        modelView:   true,
      };

      // Slider ranges are clamped to the wall length so dragging can't push
      // the cutter past the wall ends — the kernel produces non-manifold
      // geometry when a CSG cutter exceeds the cuttee bounds.
      openingFolder.add(openingParams.start, 'alongWall', 0, DIAG, 0.05).name('Start (along wall)').onChange((value) => {
        if (opening) opening.start = [value, openingParams.start.acrossWall, openingParams.start.elevation];
      });
      openingFolder.add(openingParams.start, 'acrossWall', -2, 2, 0.1).name('Start (across wall)').onChange((value) => {
        if (opening) opening.start = [openingParams.start.alongWall, value, openingParams.start.elevation];
      });
      openingFolder.add(openingParams.start, 'elevation', 0, 5, 0.1).name('Start (elevation)').onChange((value) => {
        if (opening) opening.start = [openingParams.start.alongWall, openingParams.start.acrossWall, value];
      });
      openingFolder.add(openingParams.end, 'alongWall', 0, DIAG, 0.05).name('End (along wall)').onChange((value) => {
        if (opening) opening.end = [value, openingParams.end.acrossWall, openingParams.end.elevation];
      });
      openingFolder.add(openingParams.end, 'acrossWall', -2, 2, 0.1).name('End (across wall)').onChange((value) => {
        if (opening) opening.end = [openingParams.end.alongWall, value, openingParams.end.elevation];
      });
      openingFolder.add(openingParams.end, 'elevation', 0, 5, 0.1).name('End (elevation)').onChange((value) => {
        if (opening) opening.end = [openingParams.end.alongWall, openingParams.end.acrossWall, value];
      });
      openingFolder.add(openingParams, 'thickness', 0.1, 2, 0.1).name('Thickness').onChange((value) => {
        if (opening) opening.thickness = value;
      });
      openingFolder.add(openingParams, 'height', 0.1, 5, 0.1).name('Height').onChange((value) => {
        if (opening) opening.height = value;
      });
      openingFolder.add(openingParams, 'baseHeight', 0, 5, 0.1).name('Base Height').onChange((value) => {
        if (opening) opening.baseHeight = value;
      });
      openingFolder.add(openingParams, 'profileView').name('Profile View').onChange((value) => {
        if (opening) opening.profileView = value;
      });
      openingFolder.add(openingParams, 'modelView').name('Model View').onChange((value) => {
        if (opening) opening.modelView = value;
      });

      // ── Door ───────────────────────────────────────────────────────────────
      const doorFolder = gui.addFolder('Door');
      doorFolder.open();
      const doorParams = {
        stationLocal:      { ...doorInitial.stationLocal },
        panelWidth:        doorInitial.panelDimensions.width,
        panelThickness:    doorInitial.panelDimensions.thickness,
        frameWidth:        doorInitial.frameDimensions.width,
        doorHeight:        doorInitial.doorHeight,
        doorQuadrant:      doorInitial.doorQuadrant,
        swingAngleDegrees: doorInitial.swingAngleDegrees,
        doorColor:         doorInitial.doorColor,
        frameColor:        doorInitial.frameColor,
        outline:           true,
        profileView:       true,
        modelView:         true,
      };

      // Clamp station range so the door's hole can't extend past the wall ends
      // (out-of-bounds CSG cutters are a kernel non-manifold trigger).
      doorFolder.add(doorParams.stationLocal, 'alongWall', 0.7, DIAG - 0.7, 0.05).name('Station (along wall)').onChange((value) => {
        if (door) door.station = { alongWall: value, elevation: doorParams.stationLocal.elevation };
      });
      doorFolder.add(doorParams.stationLocal, 'elevation', 0, 2, 0.05).name('Station (elevation)').onChange((value) => {
        if (door) door.station = { alongWall: doorParams.stationLocal.alongWall, elevation: value };
      });
      doorFolder.add(doorParams, 'doorQuadrant', 1, 4, 1).name('Door Quadrant (1-4)').onChange((value) => {
        if (door) door.doorQuadrant = value;
      });
      doorFolder.add(doorParams, 'swingAngleDegrees', 0, 90, 1).name('Swing Angle (°)').onChange((value) => {
        if (door) door.swingAngleDegrees = value;
      });
      doorFolder.add(doorParams, 'panelWidth', 0.6, 2.4, 0.05).name('Panel Width').onChange((value) => {
        if (door) door.panelWidth = value;
      });
      doorFolder.add(doorParams, 'panelThickness', 0.025, 0.1, 0.005).name('Panel Thickness').onChange((value) => {
        if (door) door.panelThickness = value;
      });
      doorFolder.add(doorParams, 'frameWidth', 0.025, 0.2, 0.005).name('Frame Width').onChange((value) => {
        if (door) door.frameWidth = value;
      });
      doorFolder.add(doorParams, 'doorHeight', 1.5, 3, 0.05).name('Door Height').onChange((value) => {
        if (door) door.doorHeight = value;
      });
      doorFolder.addColor(doorParams, 'doorColor').name('Panel Color').onChange((value) => {
        if (door) door.doorColor = value;
      });
      doorFolder.addColor(doorParams, 'frameColor').name('Frame Color').onChange((value) => {
        if (door) door.frameColor = value;
      });
      doorFolder.add(doorParams, 'outline').name('Outline').onChange((value) => {
        if (door) door.outline = value;
      });
      doorFolder.add(doorParams, 'profileView').name('Profile View').onChange((value) => {
        if (door) door.profileView = value;
      });
      doorFolder.add(doorParams, 'modelView').name('Model View').onChange((value) => {
        if (door) door.modelView = value;
      });

      // ── Window ─────────────────────────────────────────────────────────────
      const windowFolder = gui.addFolder('Window');
      windowFolder.open();
      const windowParams = {
        stationLocal:     { ...windowInitial.stationLocal },
        windowDimensions: { ...windowInitial.windowDimensions },
        frameDimensions:  { ...windowInitial.frameDimensions },
        windowHeight:     windowInitial.windowHeight,
        sillHeight:       windowInitial.sillHeight,
        glassColor:       windowInitial.glassColor,
        frameColor:       windowInitial.frameColor,
        outline:          true,
        profileView:      true,
        modelView:        true,
      };

      windowFolder.add(windowParams.stationLocal, 'alongWall', 1, DIAG - 1, 0.05).name('Station (along wall)').onChange((value) => {
        if (windowElement) windowElement.station = { alongWall: value };
      });
      windowFolder.add(windowParams.windowDimensions, 'width', 0.2, 4, 0.1).name('Width').onChange((value) => {
        if (windowElement) windowElement.windowWidth = value;
      });
      windowFolder.add(windowParams.windowDimensions, 'thickness', 0.05, 1, 0.05).name('Thickness').onChange((value) => {
        if (windowElement) windowElement.windowThickness = value;
      });
      windowFolder.add(windowParams.frameDimensions, 'width', 0.05, 0.6, 0.05).name('Frame Width').onChange((value) => {
        if (windowElement) windowElement.frameWidth = value;
      });
      windowFolder.add(windowParams.frameDimensions, 'thickness', 0.05, 0.6, 0.05).name('Frame Thickness').onChange((value) => {
        if (windowElement) windowElement.frameThickness = value;
      });
      windowFolder.add(windowParams, 'windowHeight', 0.2, 4, 0.1).name('Height').onChange((value) => {
        if (windowElement) windowElement.windowHeight = value;
      });
      windowFolder.add(windowParams, 'sillHeight', 0, 3, 0.1).name('Sill Height').onChange((value) => {
        if (windowElement) windowElement.sillHeight = value;
      });
      windowFolder.addColor(windowParams, 'glassColor').name('Glass Color').onChange((value) => {
        if (windowElement) windowElement.glassColor = value;
      });
      windowFolder.addColor(windowParams, 'frameColor').name('Frame Color').onChange((value) => {
        if (windowElement) windowElement.frameColor = value;
      });
      windowFolder.add(windowParams, 'outline').name('Outline').onChange((value) => {
        if (windowElement) windowElement.outline = value;
      });
      windowFolder.add(windowParams, 'profileView').name('Profile View').onChange((value) => {
        if (windowElement) windowElement.profileView = value;
      });
      windowFolder.add(windowParams, 'modelView').name('Model View').onChange((value) => {
        if (windowElement) windowElement.modelView = value;
      });
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
