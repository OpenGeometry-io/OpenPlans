<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Wall</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: "JetBrains Mono", monospace;
    }
  </style>
</head>

<body>
  <div class="example-title">Wall Shape</div>
  <div id="app">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let singleWall;
    let windowElement = null;
    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;
      openPlans.toggleGrid(false);

      // Create a 5 m straight wall so the window has room to sit comfortably.
      singleWall = openPlans.singleWall({
        points: [[0, 0, 0], [5, 0, 0]],
        thickness: 0.3,
        height: 3,
      });
      singleWall.outline = true;

      // Attach a window centred at 2.5 m along the wall.
      windowElement = openPlans.window({
        stationLocal: { alongWall: 2.5 },
        windowDimensions: { width: 1.2, thickness: 0.04 },
        frameDimensions: { width: 0.05, thickness: 0.3 },
        windowHeight: 1.2,
        sillHeight: 0.9,
        frameColor: 0xD4D0CB,
        glassColor: 0x87ceeb,
      });
      windowElement.outline = true;
      singleWall.attachWindow(windowElement);

      openPlans.fitToView([singleWall]);

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      // ── Wall ────────────────────────────────────────────────────────────────
      const wallFolder = gui.addFolder('Wall');
      wallFolder.open();

      const params = {
        outline: true,
        start: { x: 0, y: 0, z: 0 },
        end: { x: 5, y: 0, z: 0 },
        thickness: 0.3,
        height: 3,
        isProfileView: true,
        isModelView: true,
      };

      wallFolder.add(params, 'outline').name('Outline').onChange((value) => {
        if (singleWall) singleWall.outline = value;
      });
      wallFolder.add(params.start, 'x', -10, 10, 0.1).name('Start X').onChange((value) => {
        if (singleWall) singleWall.start = [value, params.start.y, params.start.z];
      });
      wallFolder.add(params.start, 'y', -10, 10, 0.1).name('Start Y').onChange((value) => {
        if (singleWall) singleWall.start = [params.start.x, value, params.start.z];
      });
      wallFolder.add(params.start, 'z', -10, 10, 0.1).name('Start Z').onChange((value) => {
        if (singleWall) singleWall.start = [params.start.x, params.start.y, value];
      });
      wallFolder.add(params.end, 'x', -10, 10, 0.1).name('End X').onChange((value) => {
        if (singleWall) singleWall.end = [value, params.end.y, params.end.z];
      });
      wallFolder.add(params.end, 'y', -10, 10, 0.1).name('End Y').onChange((value) => {
        if (singleWall) singleWall.end = [params.end.x, value, params.end.z];
      });
      wallFolder.add(params.end, 'z', -10, 10, 0.1).name('End Z').onChange((value) => {
        if (singleWall) singleWall.end = [params.end.x, params.end.y, value];
      });
      wallFolder.add(params, 'thickness', 0.1, 2, 0.1).name('Thickness').onChange((value) => {
        if (singleWall) singleWall.wallThickness = value;
      });
      wallFolder.add(params, 'height', 1, 10, 0.1).name('Height').onChange((value) => {
        if (singleWall) singleWall.wallHeight = value;
      });
      wallFolder.add(params, 'isProfileView').name('Profile View').onChange((value) => {
        if (singleWall) singleWall.profileView = value;
      });
      wallFolder.add(params, 'isModelView').name('Model View').onChange((value) => {
        if (singleWall) singleWall.modelView = value;
      });

      wallFolder.add({
        logConfig: () => {
          if (singleWall) {
            console.log('Current Wall Config:', singleWall.getOPConfig());
          }
        }
      }, 'logConfig').name('Log Config');

      wallFolder.add({
        fit: () => openPlans.fitToView([singleWall, ...(windowElement ? [windowElement] : [])]),
      }, 'fit').name('Fit');

      // ── Window ──────────────────────────────────────────────────────────────
      const windowFolder = gui.addFolder('Window');
      windowFolder.open();

      const windowParams = {
        attached: true,
        alongWall: 2.5,
        windowWidth: 1.2,
        glassThickness: 0.04,
        frameWidth: 0.05,
        frameThickness: 0.3,
        windowHeight: 1.2,
        sillHeight: 0.9,
        glassColor: '#87ceeb',
        frameColor: '#d4d0cb',
        outline: true,
        profileView: true,
        modelView: true,
      };

      windowFolder.add(windowParams, 'attached').name('Attached to Wall').onChange((value) => {
        if (!singleWall || !windowElement) return;
        if (value) {
          singleWall.attachWindow(windowElement);
        } else {
          singleWall.detachWindow(windowElement);
        }
      });

      windowFolder.add(windowParams, 'alongWall', 0.5, 4.5, 0.05).name('Along Wall').onChange((value) => {
        if (windowElement) windowElement.station = { alongWall: value };
      });

      windowFolder.add(windowParams, 'windowWidth', 0.3, 2.5, 0.05).name('Width').onChange((value) => {
        if (windowElement) windowElement.windowWidth = value;
      });
      windowFolder.add(windowParams, 'glassThickness', 0.02, 0.1, 0.005).name('Glass Thickness').onChange((value) => {
        if (windowElement) windowElement.windowThickness = value;
      });
      windowFolder.add(windowParams, 'frameWidth', 0.03, 0.15, 0.005).name('Frame Width').onChange((value) => {
        if (windowElement) windowElement.frameWidth = value;
      });
      windowFolder.add(windowParams, 'frameThickness', 0.1, 0.4, 0.01).name('Frame Thickness').onChange((value) => {
        if (windowElement) windowElement.frameThickness = value;
      });
      windowFolder.add(windowParams, 'windowHeight', 0.3, 2.5, 0.05).name('Height').onChange((value) => {
        if (windowElement) windowElement.windowHeight = value;
      });
      windowFolder.add(windowParams, 'sillHeight', 0, 2, 0.05).name('Sill Height').onChange((value) => {
        if (windowElement) windowElement.sillHeight = value;
      });
      windowFolder.addColor(windowParams, 'glassColor').name('Glass Color').onChange((value) => {
        if (windowElement) windowElement.glassColor = parseInt(value.slice(1), 16);
      });
      windowFolder.addColor(windowParams, 'frameColor').name('Frame Color').onChange((value) => {
        if (windowElement) windowElement.frameColor = parseInt(value.slice(1), 16);
      });
      windowFolder.add(windowParams, 'outline').name('Outline').onChange((value) => {
        if (windowElement) windowElement.outline = value;
      });
      windowFolder.add(windowParams, 'profileView').name('Profile View').onChange((value) => {
        if (windowElement) windowElement.profileView = value;
      });
      windowFolder.add(windowParams, 'modelView').name('Model View').onChange((value) => {
        if (windowElement) windowElement.modelView = value;
      });

      windowFolder.add({
        logConfig: () => {
          if (windowElement) console.log('Window Config:', windowElement.getOPConfig());
        }
      }, 'logConfig').name('Log Config');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
