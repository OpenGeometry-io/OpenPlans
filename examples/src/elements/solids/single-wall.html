<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Wall</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: "JetBrains Mono", monospace;
    }
  </style>
</head>

<body>
  <div class="example-title">Wall Shape</div>
  <div id="app">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let singleWall;
    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      openPlans.showGrid = false;

      // Create a default wall on scene load
      singleWall = openPlans.singleWall();
      singleWall.outline = true;

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      const wallFolder = gui.addFolder('Wall');
      wallFolder.open();

      const params = {
        outline: true,
        start: { x: 0, y: 0, z: 0 },
        end: { x: 1.5, y: 0, z: 1.5 },
        thickness: 0.3,
        height: 3,
        isProfileView: true,
        isModelView: true,
      };

      wallFolder.add(params, 'outline').name('Outline').onChange((value) => {
        if (singleWall) singleWall.outline = value;
      });
      wallFolder.add(params.start, 'x', -10, 10, 0.1).name('Start X').onChange((value) => {
        if (singleWall) singleWall.start = [value, params.start.y, params.start.z];
      });
      wallFolder.add(params.start, 'y', -10, 10, 0.1).name('Start Y').onChange((value) => {
        if (singleWall) singleWall.start = [params.start.x, value, params.start.z];
      });
      wallFolder.add(params.start, 'z', -10, 10, 0.1).name('Start Z').onChange((value) => {
        if (singleWall) singleWall.start = [params.start.x, params.start.y, value];
      });
      wallFolder.add(params.end, 'x', -10, 10, 0.1).name('End X').onChange((value) => {
        if (singleWall) singleWall.end = [value, params.end.y, params.end.z];
      });
      wallFolder.add(params.end, 'y', -10, 10, 0.1).name('End Y').onChange((value) => {
        if (singleWall) singleWall.end = [params.end.x, value, params.end.z];
      });
      wallFolder.add(params.end, 'z', -10, 10, 0.1).name('End Z').onChange((value) => {
        if (singleWall) singleWall.end = [params.end.x, params.end.y, value];
      });
      wallFolder.add(params, 'thickness', 0.1, 2, 0.1).name('Thickness').onChange((value) => {
        if (singleWall) singleWall.wallThickness = value;
      });
      wallFolder.add(params, 'height', 1, 10, 0.1).name('Height').onChange((value) => {
        if (singleWall) singleWall.wallHeight = value;
      });
      wallFolder.add(params, 'isProfileView').name('Profile View').onChange((value) => {
        if (singleWall) singleWall.profileView = value;
      });
      wallFolder.add(params, 'isModelView').name('Model View').onChange((value) => {
        if (singleWall) singleWall.modelView = value;
      });

      wallFolder.add({
        preloadWall: () => {
          const config = {
            ogid: '86302abc-d71e-47be-affc-dc05de1db8fe',
            points: [
              [3, 0, 0],
              [5, 0, -5],
            ],
            color: '#ff0000',
          };
          const preloadConfig = openPlans.singleWall(config);
          preloadConfig.outline = params.outline;

          console.log('Preloaded Wall Config:', preloadConfig.getOPConfig());
        }
      }, 'preloadWall');

      wallFolder.add({
        logConfig: () => {
          if (singleWall) {
            console.log('Current Wall Config:', singleWall.getOPConfig());
          } else {
            console.log('No wall created yet.');
          }
        }
      }, 'logConfig');

      wallFolder.add({ fit: () => { if (singleWall) openPlans.fit(singleWall.id) } }, 'fit').name('Fit');
      wallFolder.add({ getConfig: () => console.log(singleWall.getOPConfig()) }, 'getConfig').name('Get Config');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
