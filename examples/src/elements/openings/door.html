<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Door</title>
  <!-- MIXPANEL_TRACKING -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: "JetBrains Mono", monospace;
    }

    #app {
      width: 100%;
      height: 100vh;
    }

    .example-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      background: rgba(26, 26, 26, 0.8);
      padding: 12px 24px;
      z-index: 1000;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="example-title">Door</div>
  <div id="app" style="width: 100%; height: 100vh;">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from './../../../../src/index.ts';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let door;
    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      openPlans.showGrid = false;

      door = openPlans.door();

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      const doorFolder = gui.addFolder('Door');
      doorFolder.open();

      const params = {
        station: { x: 0, y: 0, z: 0 },
        panelDimensions: { width: 1, thickness: 0.2 },
        frameDimensions: { width: 0.2, thickness: 0.2 },
        doorHeight: 2.1,
        doorColor: '#cc7a00',
        frameColor: '#654321',
        isProfileView: true,
        isModelView: true,
        isHostObject: false,
        outline: true,
      };
      
      doorFolder.add(params, 'isHostObject').name('Host Object').onChange((value) => {
        if (door && value) {
          door.hostObject = 'example-wall-id';
        } else if (door) {
          door.hostObject = null;
        }
      });
      doorFolder.add(params.station, 'x', -10, 10, 0.1).name('Station X').onChange((value) => {
        if (door) door.station = [value, params.station.y, params.station.z];
      });
      doorFolder.add(params.station, 'y', -10, 10, 0.1).name('Station Y').onChange((value) => {
        if (door) door.station = [params.station.x, value, params.station.z];
      });
      doorFolder.add(params.station, 'z', -10, 10, 0.1).name('Station Z').onChange((value) => {
        if (door) door.station = [params.station.x, params.station.y, value];
      });
      doorFolder.add(params.panelDimensions, 'width', 0.1, 2, 0.1).name('Width').onChange((value) => {
        if (door) door.panelWidth = value;
      });
      doorFolder.add(params.panelDimensions, 'thickness', 0.1, 2, 0.1).name('Thickness').onChange((value) => {
        if (door) door.panelThickness = value;
      });
      doorFolder.add(params.frameDimensions, 'width', 0.1, 1, 0.1).name('Frame Width').onChange((value) => {
        if (door) door.frameWidth = value;
      });
      doorFolder.add(params.frameDimensions, 'thickness', 0.1, 1, 0.1).name('Frame Thickness').onChange((value) => {
        if (door) door.frameThickness = value;
      });
      doorFolder.add(params, 'doorHeight', 0.1, 5, 0.1).name('Height').onChange((value) => {
        if (door) door.doorHeight = value;
      });
      doorFolder.addColor(params, 'doorColor').name('Door Color').onChange((value) => {
        if (door) door.doorColor = value;
      });
      doorFolder.addColor(params, 'frameColor').name('Frame Color').onChange((value) => {
        if (door) door.frameColor = value;
      });
      doorFolder.add(params, 'outline').name('Outline').onChange((value) => {
        if (door) door.outline = value;
      });
      doorFolder.add(params, 'isProfileView').name('Profile View').onChange((value) => {
        if (door) door.profileView = value;
      });
      doorFolder.add(params, 'isModelView').name('Model View').onChange((value) => {
        if (door) door.modelView = value;
      });

      doorFolder.add({
        preloadDoor: () => {
          const config = {
            ogid: '86302abc-d71e-47be-affc-dc05de1db8fe',
            points: [
              [3, 0, 0],
              [5, 0, -5],
            ],
            color: '#ff0000',
          };
          const preloadConfig = openPlans.door(config);
          preloadConfig.outline = params.outline;

          console.log('Preloaded Door Config:', preloadConfig.getOPConfig());
        }
      }, 'preloadDoor');

      doorFolder.add({
        logConfig: () => {
          if (door) {
            console.log('Current Door Config:', door.getOPConfig());
          } else {
            console.log('No door created yet.');
          }
        }
      }, 'logConfig');

      doorFolder.add({ fit: () => { if (door) openPlans.fit(door.id) } }, 'fit').name('Fit');
      doorFolder.add({ getConfig: () => console.log(door.getOPConfig()) }, 'getConfig').name('Get Config');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
