<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans Door</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: "JetBrains Mono", monospace;
    }
  </style>
</head>

<body>
  <div class="example-title">Door</div>
  <div id="app">
  </div>
  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let door;
    let openPlans;

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      openPlans.showGrid = false;

      door = openPlans.door();

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      const doorFolder = gui.addFolder('Door');
      doorFolder.open();

      const params = {
        // Wall-local station: alongWall is distance along the wall, elevation is vertical offset.
        stationLocal: { alongWall: 0, elevation: 0 },
        panelDimensions: { width: 1, thickness: 0.04 },
        frameDimensions: { width: 0.1, thickness: 0.15 },
        doorHeight: 2.1,
        doorColor: '#f0ede6',
        frameColor: '#d4d0cb',
        isProfileView: true,
        isModelView: true,
        isHostObject: false,
        outline: true,
        doorQuadrant: 1,
        // 0 = closed (panel along wall), 90 = fully open (panel perpendicular).
        swingAngleDegrees: 90,
      };

      doorFolder.add(params, 'isHostObject').name('Host Object').onChange((value) => {
        if (door && value) {
          door.hostObject = 'example-wall-id';
        } else if (door) {
          door.hostObject = null;
        }
      });
      doorFolder.add(params.stationLocal, 'alongWall', -10, 10, 0.1).name('Station (along wall)').onChange((value) => {
        if (door) door.station = { alongWall: value, elevation: params.stationLocal.elevation };
      });
      doorFolder.add(params.stationLocal, 'elevation', -5, 5, 0.1).name('Station (elevation)').onChange((value) => {
        if (door) door.station = { alongWall: params.stationLocal.alongWall, elevation: value };
      });
      doorFolder.add(params.panelDimensions, 'width', 0.6, 2.4, 0.05).name('Panel Width').onChange((value) => {
        if (door) door.panelWidth = value;
      });
      doorFolder.add(params.panelDimensions, 'thickness', 0.025, 0.1, 0.005).name('Panel Thickness').onChange((value) => {
        if (door) door.panelThickness = value;
      });
      doorFolder.add(params.frameDimensions, 'width', 0.05, 0.2, 0.005).name('Frame Width').onChange((value) => {
        if (door) door.frameWidth = value;
      });
      doorFolder.add(params.frameDimensions, 'thickness', 0.1, 0.3, 0.01).name('Frame Thickness').onChange((value) => {
        if (door) door.frameThickness = value;
      });
      doorFolder.add(params, 'doorQuadrant', 1, 4, 1).name('Door Quadrant').onChange((value) => {
        if (door) door.doorQuadrant = value;
      });
      doorFolder.add(params, 'swingAngleDegrees', 0, 90, 1).name('Swing Angle (°)').onChange((value) => {
        if (door) door.swingAngleDegrees = value;
      });
      doorFolder.add(params, 'doorHeight', 0.1, 5, 0.1).name('Height').onChange((value) => {
        if (door) door.doorHeight = value;
      });
      doorFolder.addColor(params, 'doorColor').name('Door Color').onChange((value) => {
        if (door) door.doorColor = value;
      });
      doorFolder.addColor(params, 'frameColor').name('Frame Color').onChange((value) => {
        if (door) door.frameColor = value;
      });
      doorFolder.add(params, 'outline').name('Outline').onChange((value) => {
        if (door) door.outline = value;
      });
      doorFolder.add(params, 'isProfileView').name('Profile View').onChange((value) => {
        if (door) door.profileView = value;
      });
      doorFolder.add(params, 'isModelView').name('Model View').onChange((value) => {
        if (door) door.modelView = value;
      });

      doorFolder.add({
        preloadDoor: () => {
          const config = {
            ogid: '86302abc-d71e-47be-affc-dc05de1db8fe',
            points: [
              [3, 0, 0],
              [5, 0, -5],
            ],
            color: '#ff0000',
          };
          const preloadConfig = openPlans.door(config);
          preloadConfig.outline = params.outline;

          console.log('Preloaded Door Config:', preloadConfig.getOPConfig());
        }
      }, 'preloadDoor');

      doorFolder.add({
        logConfig: () => {
          if (door) {
            console.log('Current Door Config:', door.getOPConfig());
          } else {
            console.log('No door created yet.');
          }
        }
      }, 'logConfig');

      doorFolder.add({ fit: () => { if (door) openPlans.fit(door.id) } }, 'fit').name('Fit');
      doorFolder.add({ getConfig: () => console.log(door.getOPConfig()) }, 'getConfig').name('Get Config');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
