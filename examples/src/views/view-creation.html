<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans View Creation</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="../shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenGeometry Demo">
  <meta name="author" content="Vishwajeet Mane">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: "JetBrains Mono", monospace;
    }
    #app {
      display: flex;
    }

    #main-view, #view-dynamic {
      width: 100%;
      height: 100%;
      border: 4px solid #000;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="example-title">View Creation</div>
  
  <div id="app">
    <div id="main-view" style="width: 50%; height: 100%; border: 4px solid #000;"></div>
    <div id="view-dynamic" style="width: 50%; height: 100%; border: 4px solid red;"></div>
  </div>

  <script type="module">
    import { OpenPlans, CameraMode } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
    import Stats from 'stats.js';
    const stats = new Stats();
    stats.showPanel(2);

    let singleWall, door;
    let openPlans;

    async function init() {
      const container = document.getElementById('main-view');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();

      openPlans.CameraMode = CameraMode.Model;

      openPlans.toggleGrid(false);

      // Create a default wall on scene load
      singleWall = openPlans.singleWall({
        points: [
          [0, 0, 0],
          [10, 0, 0],
        ],
        height: 5
      });
      singleWall.outline = true;

      // Adding Door
      door = openPlans.door({
        hostWallId: singleWall.ogid,
        stationLocal: { u: 4.5, h: 0 },
        panelDimensions: { width: 1, thickness: 0.3 },
        frameDimensions: { width: 0.2, thickness: 0.3 },
        doorHeight: 2.1,
        doorColor: '#cc7a00',
        frameColor: '#654321'
      });
      singleWall.attachDoor(door);
      // door.modelView = false;

      openPlans.onRender.add(() => {
        stats.begin();
        stats.end();
      });
    }

    function setUI() {
      const gui = new GUI();

      // Stored Views
      const storedViewsFolder = gui.addFolder('Stored Views');
      storedViewsFolder.open();

      const storedViewsParams = {};

      // New View
      const viewFolder = gui.addFolder('View Creation');
      viewFolder.open();

      const viewParams = {
        createView: () => {

          const position = openPlans.planCamera.position;
          const target = openPlans.planCamera.target;

          const config = { 
            camera: {
              position: { x: position.x,
                y: position.y,
                z: position.z
              },
              target: { x: target.x,
                y: target.y,
                z: target.z
              }
            },
            bounds: {
              min: { x: -20, y: -20, z: -20 },
              max: { x: 20, y: 20, z: 20 }
            }
          }

          const newView = openPlans.viewManager.createView(config);
          console.log('Created View:', newView);
          
          storedViewsParams[newView.ogid] = () => {
            const view = openPlans.viewManager.getView(newView.ogid);
            console.log('Switching to View:', view);
          };
          storedViewsFolder.add(storedViewsParams, newView.ogid).name(`View ${Object.keys(storedViewsParams).length}`);
        }
      };

      viewFolder.add(viewParams, 'createView').name('Create View');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
