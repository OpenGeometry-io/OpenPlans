<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Floor Plan Example</title>
    <!-- TRACKING -->
  <link rel="stylesheet" href="./shared/example.css">
    <style>
    #canvas-container {
            width: 100vw;
            height: 100vh;
        }
  </style>
</head>

<body>
    <div class="example-title">JSON Floor Plan</div>
    <div id="canvas-container"></div>

                    },
                    {

                "elements": [
                    {
                        "id": "wall_1",

                    },
                    {
                        "id": "wall_2",
                        "type": "wall",
                        "points": [[-6, 11.5], [2, 11.5]],
                        "length": 8,
                        "connects": ["bedroom_2", "exterior"]
                    },
                    {
                        "id": "wall_3",
                        "type": "wall",
                        "points": [[2, 11.5], [16, 11.5]],

                        "connects": ["exterior", "kitchen"]
                    },
                    {

                        "type": "wall",

                        "connects": ["kitchen", "exterior"]
                    },
                    {
                        "id": "wall_5",
                        "type": "wall",
                        "points": [[16, -11.5], [-14, -11.5]],
                        "length": 30,
                        "connects": ["exterior", "exterior"]
                    },
                    {
                        "id": "wall_6",

                    {
                        "id": "wall_8",
                        "type": "wall",
                        "points": [[-6, 11.5], [-6, 5]],

                        "connects": ["bedroom_1", "bedroom_2"]

                    {
                        "id": "wall_9",

                        "connects": ["bedroom_2", "living_room"]
                    },
                    {
                        "id": "wall_10",

                    },
                    {
                        "id": "wall_11",

                    },
                    {
                        "id": "wall_12",

                    {

                    },
                    {

                    },
                    {
                        "id": "wall_15",
                        "type": "wall",
                        "points": [[10, -7.5], [16, -7.5]],

                    {

                    {
                        "id": "door_2",
                        "type": "door",
                        "position": [0, 2.5],
                        "length": 1,

                        "connects": ["bedroom_2", "living_room"],
                        "swing_direction": "into_living_room"
                    },
                    {
                        "id": "door_3",
                        "type": "door",
                        "position": [6, -0.5],
                        "length": 1,

                    {
                        "id": "door_4",
                        "type": "door",

                    {
                        "id": "window_1",
                        "type": "window",
                        "position": [-10, 11.5],
                        "length": 2,

                    },
                    {
                        "id": "window_2",
                        "type": "window",

                    },
                    {
                        "id": "window_4",
                        "type": "window",
                        "position": [8, 11.5],
                        "length": 2,

                    },
                    {
                        "id": "window_5",
                        "type": "window",
                        "position": [-4, -11.5],
                        "length": 2,
                        "orientation": "horizontal",
                        "wall": "wall_5"
                    },
                    {
                        "id": "window_6",
                        "type": "window",
                        "position": [6, -11.5],
                        "length": 2,
                        "orientation": "horizontal",
                        "wall": "wall_5"
                    }
                ]
            }
        };

        const container = document.getElementById('canvas-container');
        const app = new OpenPlans(container);

        app.setupOpenGeometry().then(() => {
            app.showGrid = true;
            app.CameraMode = CameraMode.Plan;
            app.renderJSON(floorPlanData);
        });

    </script>
</body>

</html>
