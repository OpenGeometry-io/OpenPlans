<!DOCTYPE html>
<html lang="en">

<head>
  <title>OpenPlans — IFC Export</title>
  <!-- TRACKING -->
  <link rel="stylesheet" href="./shared/example.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenPlans IFC export example">
  <meta name="author" content="OpenPlans">
  <style>
    #app { cursor: unset !important; }

    .status-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 26, 26, 0.88);
      color: #f5f5f5;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 10px 20px;
      letter-spacing: 1px;
      z-index: 1000;
      max-width: calc(100vw - 40px);
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="example-title">IFC Export</div>
  <div id="app"></div>
  <div class="status-bar" id="status">Scene ready. Use the panel to export.</div>

  <script type="module">
    import { OpenPlans, CameraMode, IFCExporter } from '@opengeometry/openplans';
    import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

    let openPlans;
    let wall, win1, win2;
    const statusEl = document.getElementById('status');

    async function init() {
      const container = document.getElementById('app');
      openPlans = new OpenPlans(container);
      await openPlans.setupOpenGeometry();
      openPlans.CameraMode = CameraMode.Model;
      openPlans.toggleGrid(false);

      wall = openPlans.singleWall({
        points: [[0, 0, 0], [8, 0, 0]],
        thickness: 0.3,
        height: 3,
      });
      wall.outline = true;

      win1 = openPlans.window({
        windowDimensions: { width: 1.4, thickness: 0.04 },
        frameDimensions: { width: 0.06, thickness: 0.3 },
        windowHeight: 1.2,
        sillHeight: 0.9,
        frameColor: 0x888888,
        glassColor: 0x87ceeb,
      });
      win1.outline = true;
      wall.attachWindow(win1, { offset: 2 });

      win2 = openPlans.window({
        windowDimensions: { width: 1.4, thickness: 0.04 },
        frameDimensions: { width: 0.06, thickness: 0.3 },
        windowHeight: 1.2,
        sillHeight: 0.9,
        frameColor: 0x888888,
        glassColor: 0x87ceeb,
      });
      win2.outline = true;
      wall.attachWindow(win2, { offset: 6 });

      openPlans.fitToView([wall]);
      statusEl.textContent = 'Scene ready — 1 wall, 2 windows. Click Export IFC to download.';
    }

    function downloadIfc(text) {
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'openplans-export.ifc';
      a.click();
      URL.revokeObjectURL(url);
    }

    function setUI() {
      const gui = new GUI();

      // Wall
      const wallFolder = gui.addFolder('Wall');
      const wallParams = { height: 3, thickness: 0.3, outline: true };
      wallFolder.add(wallParams, 'height', 1, 6, 0.1).name('Height').onChange(v => { wall.wallHeight = v; });
      wallFolder.add(wallParams, 'thickness', 0.1, 0.6, 0.01).name('Thickness').onChange(v => { wall.wallThickness = v; });
      wallFolder.add(wallParams, 'outline').name('Outline').onChange(v => { wall.outline = v; });

      // Windows
      const winFolder = gui.addFolder('Windows');
      const winParams = { width: 1.4, height: 1.2, sillHeight: 0.9, glassColor: '#87ceeb' };
      winFolder.add(winParams, 'width', 0.4, 3, 0.1).name('Width').onChange(v => {
        win1.windowWidth = v;
        win2.windowWidth = v;
      });
      winFolder.add(winParams, 'height', 0.3, 2.5, 0.1).name('Height').onChange(v => {
        win1.windowHeight = v;
        win2.windowHeight = v;
      });
      winFolder.add(winParams, 'sillHeight', 0, 2, 0.1).name('Sill Height').onChange(v => {
        win1.sillHeight = v;
        win2.sillHeight = v;
      });
      winFolder.addColor(winParams, 'glassColor').name('Glass Color').onChange(v => {
        const hex = parseInt(v.replace('#', ''), 16);
        win1.glassColor = hex;
        win2.glassColor = hex;
      });

      // Export
      gui.add({
        exportIfc: async () => {
          try {
            statusEl.textContent = 'Exporting IFC…';
            const exporter = new IFCExporter();
            // Only Window implements getExportRoots required by IFCExporter
            const result = exporter.generate({ elements: [win1, win2] });
            downloadIfc(result.text);
            const report = JSON.parse(result.reportJson);
            statusEl.textContent = `IFC exported — ${report.exported_elements ?? '?'} elements written.`;
          } catch (err) {
            console.error('[ifc-export]', err);
            statusEl.textContent = `Export failed: ${err.message}`;
          }
        }
      }, 'exportIfc').name('Export IFC');
    }

    (async function () {
      await init();
      setUI();
    })();
  </script>
</body>

</html>
