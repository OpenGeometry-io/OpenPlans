<!DOCTYPE html>
<html lang="en">

<head>
    <title>Thumbnail Generator</title>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
        }

        #app {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="app"></div>
    <script type="module">
        import { OpenPlans, Vector3 } from '../src/index.ts';
        import * as THREE from 'three';

        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const elementKey = urlParams.get('element'); // e.g., 'chair2D'

        if (!elementKey) {
            console.error("No 'element' parameter provided.");
        }

        async function init() {
            const container = document.getElementById('app');
            const openPlans = new OpenPlans(container);
            await openPlans.setupOpenGeometry();

            // Clear default scene if needed
            if (openPlans.openThree && openPlans.openThree.openGrid) {
                openPlans.openThree.openGrid.visible = false;
            }

            // Set background to transparent
            if (openPlans.openThree && openPlans.openThree.renderer) {
                openPlans.openThree.renderer.setClearColor(0xffffff, 0);
                openPlans.openThree.scene.background = null;
            }

            if (elementKey === 'export-ifc') {
                const wall = openPlans.wall2D({
                    labelName: '',
                    type: 'WALL',
                    wallThickness: 0.28,
                });
                wall.updatePoints([
                    new Vector3(-4.0, 0, -1.0),
                    new Vector3(4.0, 0, -1.0),
                ]);

                const door = openPlans.door2D({
                    labelName: '',
                    type: 'DOOR',
                });
                door.position.set(0, 0, -1.0);

                const window = openPlans.singleWindow2D({
                    labelName: '',
                    type: 'WINDOW',
                });
                window.position.set(2.2, 0, -1.0);

                await fitCamera(openPlans, wall);
                return;
            }

            // Create the element dynamically
            if (openPlans[elementKey]) {
                const config = {};
                // Element-specific thumbnail defaults
                if (elementKey === 'wall2D') {
                    config.labelName = "";
                    config.points = [
                        { x: -5, y: 0, z: -2 },
                        { x: 5, y: 0, z: -2 },
                        { x: 5, y: 0, z: 5 },
                        { x: -2, y: 0, z: 5 }
                    ];
                    config.wallThickness = 0.3;
                    config.wallHeight = 3.0;
                    config.wallColor = 0xcccccc;
                } else if (elementKey.endsWith('2D')) {
                    // Most 2D elements only need a label override.
                    config.labelName = "";
                } else if (elementKey === 'board') {
                    config.width = 30;
                    config.height = 20;
                    config.boardColor = 0xdddddd;
                } else if (elementKey === 'paperFrame') {
                    config.format = 'A3';
                    config.format = 'A3';
                    config.orientation = 'landscape';
                } else if (elementKey === 'lineDimension') {
                    config.startPoint = [1.5, 0, 1];
                    config.endPoint = [-3.5, 0, 0];
                    config.offset = 3.5; // 'spacing' in example
                } else if (elementKey === 'angleDimension') {
                    config.center = [0, 0, 0];
                    config.radius = 2;
                    config.vector1 = [3, 0, 0];
                    config.vector2 = [0, 0, 3];
                } else if (elementKey === 'radiusDimension') {
                    config.center = [0, 0, 0];
                    config.radius = 5;
                    config.angle = Math.PI / 4; // 45 degrees
                    config.textOffset = 0.2;
                }

                const element = openPlans[elementKey](config);

                // Enable outline for shape elements
                if (elementKey === 'cuboid' || elementKey === 'cylinder') {
                    element.outline = true;
                }

                // Wait for a frame
                await fitCamera(openPlans, element);
            } else {
                console.error(`Element '${elementKey}' not found in OpenPlans.`);
            }
        }

        async function fitCamera(openPlans, element) {
            await openPlans.fit(element.id);
            // Signal ready for Puppeteer
            document.body.setAttribute('data-ready', 'true');
        }

        init();
    </script>
</body>

</html>
